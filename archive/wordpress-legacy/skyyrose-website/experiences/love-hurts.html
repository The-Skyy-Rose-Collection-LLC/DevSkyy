<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Enter the Beast's bedroom. An immersive 3D experience for the SkyyRose LOVE HURTS collection — the enchanted rose, the balcony, the transformation.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",

        }
    }
    </script>
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen">
    <div class="loading-logo">LOVE HURTS</div>

        <div class="loading-bar" id="loading-bar"></div>

</div>

<!-- 3D Canvas -->
<div id="canvas-container"></div>

<!-- UI Overlay -->
<div id="ui-overlay">
    <div class="brand-header">
        <div class="brand-name">SKYYROSE</div>
        <div class="collection-label">Love Hurts Collection</div>
    </div>

    <div class="room-indicator">
        <div class="room-label" id="room-label">Room 1 of 3 — The Bedroom</div>
        <div class="room-dots">
            <div class="room-dot active" data-room="0"></div>

        </div>

    <div class="narrative" id="narrative">
        <p class="narrative-text" id="narrative-text"></p>
    </div>

    <div class="nav-arrows" id="nav-arrows"></div>

    <div id="hotspots-layer"></div>

    <div class="shop-cta" id="shop-cta">
        <a href="/collections/love-hurts">Shop the Collection</a>
    </div>

    <div class="back-link">
        <a href="/experiences">Back to Experiences</a>
    </div>
</div>

<!-- Product Detail Panel -->
<div class="product-panel" id="product-panel">
    <button class="panel-close" id="panel-close">&times;</button>
    <div class="panel-image" id="panel-image"></div>
    <h2 class="panel-title" id="panel-title"></h2>
    <p class="panel-price" id="panel-price"></p>
    <p class="panel-desc" id="panel-desc"></p>
    <button class="panel-cta" id="panel-cta">Add to Cart</button>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// WebGL support check
function hasWebGL() {
    try {
        var canvas = document.createElement('canvas');
        return !!(window.WebGLRenderingContext && (canvas.getContext('webgl') || canvas.getContext('experimental-webgl')));
    } catch (e) { return false; }
}

if (!hasWebGL()) {
    var loading = document.getElementById('loading-screen');
    if (loading) {
        loading.innerHTML = '<div style="text-align:center;padding:2rem;"><h2 style="font-family:Playfair Display,serif;color:#DC143C;margin-bottom:1rem;">Experience Unavailable</h2><p style="color:rgba(255,255,255,0.6);margin-bottom:2rem;">Your browser does not support WebGL. Please use a modern browser for the full experience.</p><a href="../collections/love-hurts.html" style="color:#DC143C;text-decoration:underline;">View the Collection</a></div>';
    }
    throw new Error('WebGL not supported');
}

// LOVE HURTS — The Beast's Sanctuary
const ROOMS = [
    {
        name: 'The Bedroom',
        label: 'Room 1 of 3 \u2014 The Bedroom',
        narrative: '\u201CThey gave me this name\u2026 Hurts. My grandmother\u2019s bloodline. Every generation carries it \u2014 the weight, the beauty, the pain.\u201D',
        nav: [{ text: 'Step onto the Balcony \u2192', target: 1 }],
        camera: { pos: [0, 2.5, 6], target: [0, 1.5, 0] },
        fog: 0x0A0510,
        products: [
            { id: 'enchanted-rose-hoodie', title: 'Enchanted Rose Hoodie', price: '$195', desc: 'Heavyweight French terry hoodie with embroidered enchanted rose on back. Thorned vine detailing on sleeves. A tribute to what endures.', screenPos: [25, 55] },
            { id: 'beast-mode-tee', title: 'Beast Mode Tee', price: '$85', desc: 'Oversized cotton tee with distressed Beast silhouette. Water-based inks, vintage wash. Isolation made beautiful.', screenPos: [68, 48] }
        ]
    },
    {
        name: 'The Balcony',
        label: 'Room 2 of 3 \u2014 The Balcony',
        narrative: '\u201CLove hurts. That\u2019s not just words \u2014 it\u2019s my last name. And this rose\u2026 it\u2019s all I have left of her.\u201D',
        nav: [{ text: '\u2190 Back to Bedroom', target: 0 }, { text: 'Witness the Transformation \u2192', target: 2 }],
        camera: { pos: [0, 2.8, 5], target: [0, 2, -1] },
        fog: 0x050210,
        products: [
            { id: 'thorned-heart-jacket', title: 'Thorned Heart Jacket', price: '$345', desc: 'Structured bomber with thorn-embossed leather panels. Crimson satin lining. Every boundary is a lesson.', screenPos: [18, 42] },
            { id: 'bloodline-crewneck', title: 'Bloodline Crewneck', price: '$145', desc: 'Midweight crewneck with HURTS gothic-letter chest print. Rose gold thread detailing. Heritage in every stitch.', screenPos: [72, 58] }
        ]
    },
    {
        name: 'The Transformation',
        label: 'Room 3 of 3 \u2014 The Transformation',
        narrative: '\u201CFrom grit to grace. Every petal that falls is a lesson. Every thorn, a boundary. This bloodline doesn\u2019t break \u2014 it transforms.\u201D',
        nav: [{ text: '\u2190 Back to Balcony', target: 1 }],
        camera: { pos: [0, 3, 7], target: [0, 2, 0] },
        fog: 0x0A0505,
        products: [
            { id: 'glass-dome-varsity', title: 'Glass Dome Varsity', price: '$295', desc: 'Wool-blend varsity jacket with crystal dome emblem. Gold chenille lettering. The crown jewel of the collection.', screenPos: [30, 50] },
            { id: 'last-petal-joggers', title: 'Last Petal Joggers', price: '$135', desc: 'Tapered joggers with falling-petal print down the leg. French terry, brushed interior. Comfort through the storm.', screenPos: [65, 52] }
        ]
    }
];

let scene, camera, renderer, controls, composer, bloomPass;
let clock = new THREE.Clock();
let currentRoom = 0;
let isTransitioning = false;

// Room-specific objects
let roomGroups = [new THREE.Group(), new THREE.Group(), new THREE.Group()];
let roomLights = [[], [], []];
let enchantedRose, petalParticles, dustParticles;
let transformationParticles;

// DOM refs
const loadingBar = document.getElementById('loading-bar');
const loadingStatus = document.getElementById('loading-status');
const loadingScreen = document.getElementById('loading-screen');
const narrativeEl = document.getElementById('narrative');
const narrativeText = document.getElementById('narrative-text');
const navArrows = document.getElementById('nav-arrows');
const roomLabel = document.getElementById('room-label');
const hotspotsLayer = document.getElementById('hotspots-layer');
const productPanel = document.getElementById('product-panel');
const shopCta = document.getElementById('shop-cta');

function setProgress(pct, text) {
    loadingBar.style.width = pct + '%';
    loadingStatus.textContent = text;
}

async function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(ROOMS[0].fog);
    scene.fog = new THREE.FogExp2(ROOMS[0].fog, 0.06);

    camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(...ROOMS[0].camera.pos);

    renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.8;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.target.set(...ROOMS[0].camera.target);
    controls.minDistance = 3;
    controls.maxDistance = 12;
    controls.maxPolarAngle = Math.PI / 1.7;
    controls.enablePan = false;

    setupPostProcessing();
    setProgress(15, 'Building the chamber...');

    buildRoom1();
    setProgress(35, 'Opening the balcony doors...');

    buildRoom2();
    setProgress(55, 'Preparing the transformation...');

    buildRoom3();
    setProgress(75, 'Lighting the candles...');

    createDustParticles();
    setProgress(90, 'Almost there...');

    // Add all room groups; hide rooms 2 and 3
    roomGroups.forEach((g, i) => {
        g.visible = i === 0;
        scene.add(g);
    });

    setupUI();
    showRoom(0, true);

    setProgress(100, 'Welcome.');
    setTimeout(() => loadingScreen.classList.add('hidden'), 800);

    window.addEventListener('resize', onResize);
    animate();
}

function setupPostProcessing() {
    composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    bloomPass = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        0.9, 0.4, 0.35
    );
    composer.addPass(bloomPass);
    composer.addPass(new OutputPass());
}

// ROOM 1 — THE BEAST'S BEDROOM
function buildRoom1() {
    const g = roomGroups[0];

    // Floor
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(18, 18),
        new THREE.MeshStandardMaterial({ color: 0x12080C, roughness: 0.9, metalness: 0.05 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    g.add(floor);

    // Walls
    const wallMat = new THREE.MeshStandardMaterial({ color: 0x0E0610, roughness: 0.95, metalness: 0.02 });
    const backWall = new THREE.Mesh(new THREE.PlaneGeometry(18, 10), wallMat);
    backWall.position.set(0, 5, -6); g.add(backWall);
    const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(12, 10), wallMat);
    leftWall.position.set(-7, 5, 0); leftWall.rotation.y = Math.PI / 2; g.add(leftWall);
    const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(12, 10), wallMat);
    rightWall.position.set(7, 5, 0); rightWall.rotation.y = -Math.PI / 2; g.add(rightWall);

    // Bed
    const bedBase = new THREE.Mesh(
        new THREE.BoxGeometry(3.5, 0.6, 4),
        new THREE.MeshStandardMaterial({ color: 0x1A0A12, roughness: 0.85, metalness: 0.05 })
    );
    bedBase.position.set(2, 0.3, -3);
    bedBase.castShadow = true; g.add(bedBase);
    const bedding = new THREE.Mesh(new THREE.BoxGeometry(3.3, 0.25, 3.8), new THREE.MeshStandardMaterial({ color: 0x3A1520, roughness: 0.95 }));
    bedding.position.set(2, 0.72, -3); g.add(bedding);
    const headboard = new THREE.Mesh(new THREE.BoxGeometry(3.5, 2.5, 0.2), new THREE.MeshStandardMaterial({ color: 0x200E15, roughness: 0.7, metalness: 0.15 }));
    headboard.position.set(2, 1.85, -4.95); g.add(headboard);

    // Chair with product placement
    const chairMat = new THREE.MeshStandardMaterial({ color: 0x2A1018, roughness: 0.8 });
    const chairSeat = new THREE.Mesh(new THREE.BoxGeometry(1, 0.15, 1), chairMat);
    chairSeat.position.set(-3, 1, -2); g.add(chairSeat);
    const chairBack = new THREE.Mesh(new THREE.BoxGeometry(1, 1.5, 0.12), chairMat);
    chairBack.position.set(-3, 1.75, -2.5); g.add(chairBack);

    const legMat = new THREE.MeshStandardMaterial({ color: 0x1A0A10, roughness: 0.6, metalness: 0.3 });
    const legGeo = new THREE.CylinderGeometry(0.04, 0.04, 1, 8);
    [[-0.4, -0.4], [0.4, -0.4], [-0.4, 0.4], [0.4, 0.4]].forEach(function(offsets) {
        const leg = new THREE.Mesh(legGeo, legMat);
        leg.position.set(-3 + offsets[0], 0.5, -2 + offsets[1]);
        g.add(leg);
    });

    // Lighting
    const ambient = new THREE.AmbientLight(0x150810, 0.5);
    g.add(ambient); roomLights[0].push(ambient);
    const mainLight = new THREE.PointLight(0x8B2252, 2.5, 14);
    mainLight.position.set(0, 6, 0); mainLight.castShadow = true;
    g.add(mainLight); roomLights[0].push(mainLight);
    const bedLight = new THREE.PointLight(0xDC143C, 0.8, 6);
    bedLight.position.set(2, 3, -3); g.add(bedLight); roomLights[0].push(bedLight);
    const chairLight = new THREE.PointLight(0x722F37, 0.6, 5);
    chairLight.position.set(-3, 3, -1); g.add(chairLight); roomLights[0].push(chairLight);

    // Nightstand with candle
    const nightstand = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshStandardMaterial({ color: 0x1A0A10, roughness: 0.7, metalness: 0.2 }));
    nightstand.position.set(4.2, 0.4, -3); g.add(nightstand);
    const candle = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.5, 12), new THREE.MeshStandardMaterial({ color: 0xFFF8DC, roughness: 0.9 }));
    candle.position.set(4.2, 1.05, -3); g.add(candle);
    const flameGlow = new THREE.PointLight(0xFFAA44, 0.6, 3);
    flameGlow.position.set(4.2, 1.4, -3); g.add(flameGlow); roomLights[0].push(flameGlow);
}

// ROOM 2 — THE BALCONY (Enchanted Rose)
function buildRoom2() {
    const g = roomGroups[1];

    // Floor
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(14, 10),
        new THREE.MeshStandardMaterial({ color: 0x0E0A0C, roughness: 0.92, metalness: 0.05 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    g.add(floor);

    // Balcony railing
    const railMat = new THREE.MeshStandardMaterial({ color: 0x1A1015, roughness: 0.5, metalness: 0.4 });
    const leftRail = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.2, 8), railMat);
    leftRail.position.set(-5, 0.6, -1); g.add(leftRail);
    const rightRail = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.2, 8), railMat);
    rightRail.position.set(5, 0.6, -1); g.add(rightRail);
    const frontRail = new THREE.Mesh(new THREE.BoxGeometry(10, 1.2, 0.1), railMat);
    frontRail.position.set(0, 0.6, -5); g.add(frontRail);

    // Balusters
    const balusterGeo = new THREE.CylinderGeometry(0.03, 0.03, 1.2, 8);
    for (let i = -4; i <= 4; i += 0.8) {
        const b = new THREE.Mesh(balusterGeo, railMat);
        b.position.set(i, 0.6, -5);
        g.add(b);
    }

    // Table for the rose
    const tableMat = new THREE.MeshStandardMaterial({ color: 0x1A0E12, roughness: 0.6, metalness: 0.3 });
    const tableTop = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.7, 0.08, 24), new THREE.MeshStandardMaterial({ color: 0x200E14, roughness: 0.5, metalness: 0.3 }));
    tableTop.position.set(0, 1.8, -2); g.add(tableTop);
    const tableLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.12, 1.8, 12), tableMat);
    tableLeg.position.set(0, 0.9, -2); g.add(tableLeg);

    // ---- ENCHANTED ROSE ----
    enchantedRose = new THREE.Group();
    enchantedRose.position.set(0, 2.2, -2);

    // Glass dome
    const domeGeo = new THREE.SphereGeometry(0.55, 32, 32, 0, Math.PI * 2, 0, Math.PI / 1.3);
    const domeMat = new THREE.MeshPhysicalMaterial({
        color: 0xffffff,
        roughness: 0.05,
        metalness: 0.0,
        transmission: 0.92,
        thickness: 0.3,
        transparent: true,
        opacity: 0.3
    });
    enchantedRose.add(new THREE.Mesh(domeGeo, domeMat));

    // Rose bloom
    const bloomMat = new THREE.MeshStandardMaterial({
        color: 0xDC143C,
        emissive: 0xDC143C,
        emissiveIntensity: 0.8,
        roughness: 0.4,
        metalness: 0.1
    });
    enchantedRose.add(new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), bloomMat));

    // Petals around center
    for (let i = 0; i < 5; i++) {
        const angle = (i / 5) * Math.PI * 2;
        const petal = new THREE.Mesh(new THREE.SphereGeometry(0.08, 12, 12), bloomMat);
        petal.position.set(Math.cos(angle) * 0.1, 0.02, Math.sin(angle) * 0.1);
        petal.scale.set(1.2, 0.6, 1.2);
        enchantedRose.add(petal);
    }

    // Stem
    const stem = new THREE.Mesh(
        new THREE.CylinderGeometry(0.015, 0.02, 0.5, 8),
        new THREE.MeshStandardMaterial({ color: 0x1A3A1A, roughness: 0.7 })
    );
    stem.position.y = -0.3;
    enchantedRose.add(stem);

    // Rose crimson glow
    const roseLight = new THREE.PointLight(0xDC143C, 3, 6);
    enchantedRose.add(roseLight); roomLights[1].push(roseLight);
    g.add(enchantedRose);

    // Falling petal particles
    const petalCount = 60;
    const petalPositions = new Float32Array(petalCount * 3);
    const petalColors = new Float32Array(petalCount * 3);
    for (let i = 0; i < petalCount; i++) {
        petalPositions[i * 3] = (Math.random() - 0.5) * 1.2;
        petalPositions[i * 3 + 1] = Math.random() * 2;
        petalPositions[i * 3 + 2] = (Math.random() - 0.5) * 1.2 - 2;
        petalColors[i * 3] = 0.86 + Math.random() * 0.14;
        petalColors[i * 3 + 1] = 0.05 + Math.random() * 0.1;
        petalColors[i * 3 + 2] = 0.15 + Math.random() * 0.1;
    }
    const petalGeo = new THREE.BufferGeometry();
    petalGeo.setAttribute('position', new THREE.BufferAttribute(petalPositions, 3));
    petalGeo.setAttribute('color', new THREE.BufferAttribute(petalColors, 3));
    petalParticles = new THREE.Points(petalGeo, new THREE.PointsMaterial({
        size: 0.04, vertexColors: true, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending
    }));
    g.add(petalParticles);

    // Moonlight and ambient
    const moonLight = new THREE.DirectionalLight(0x6677AA, 0.6);
    moonLight.position.set(2, 8, -10); g.add(moonLight); roomLights[1].push(moonLight);
    const ambientBalcony = new THREE.AmbientLight(0x0A0515, 0.4);
    g.add(ambientBalcony); roomLights[1].push(ambientBalcony);
    const railAccent = new THREE.PointLight(0x2D0A1F, 1, 8);
    railAccent.position.set(-4, 2, -3); g.add(railAccent); roomLights[1].push(railAccent);
}

// ROOM 3 — THE TRANSFORMATION
function buildRoom3() {
    const g = roomGroups[2];

    // Polished floor
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(16, 16),
        new THREE.MeshStandardMaterial({ color: 0x100808, roughness: 0.3, metalness: 0.4 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    g.add(floor);

    // Display stands
    const standMat = new THREE.MeshStandardMaterial({ color: 0x1A0E10, roughness: 0.4, metalness: 0.5 });
    const standGold = new THREE.MeshStandardMaterial({ color: 0xD4AF37, roughness: 0.2, metalness: 0.8 });

    [[-2.5, 0], [2.5, 0]].forEach(function(coords) {
        var x = coords[0], z = coords[1];
        var pedestal = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.6, 2.5, 16), standMat);
        pedestal.position.set(x, 1.25, z);
        pedestal.castShadow = true;
        g.add(pedestal);

        var cap = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.5, 0.1, 16), standGold);
        cap.position.set(x, 2.55, z);
        g.add(cap);

        var spot = new THREE.SpotLight(0xD4AF37, 2, 8, Math.PI / 8, 0.5);
        spot.position.set(x, 6, z + 2);
        spot.target.position.set(x, 2.5, z);
        spot.castShadow = true;
        g.add(spot);
        g.add(spot.target);
        roomLights[2].push(spot);
    });

    // Central light — crimson to gold transition
    const centralLight = new THREE.PointLight(0xDC143C, 0.5, 12);
    centralLight.position.set(0, 5, 0); centralLight.name = 'transformCentralLight';
    g.add(centralLight); roomLights[2].push(centralLight);
    const upLight1 = new THREE.PointLight(0x722F37, 1.5, 10);
    upLight1.position.set(-3, 0.5, -3); upLight1.name = 'transformUp1';
    g.add(upLight1); roomLights[2].push(upLight1);
    const upLight2 = new THREE.PointLight(0x722F37, 1.5, 10);
    upLight2.position.set(3, 0.5, -3); upLight2.name = 'transformUp2';
    g.add(upLight2); roomLights[2].push(upLight2);
    const ambientTrans = new THREE.AmbientLight(0x0A0505, 0.3);
    g.add(ambientTrans); roomLights[2].push(ambientTrans);

    // Transformation particle burst
    const tpCount = 300;
    const tpPos = new Float32Array(tpCount * 3);
    const tpCol = new Float32Array(tpCount * 3);
    for (let i = 0; i < tpCount; i++) {
        tpPos[i * 3] = (Math.random() - 0.5) * 10;
        tpPos[i * 3 + 1] = Math.random() * 8;
        tpPos[i * 3 + 2] = (Math.random() - 0.5) * 10;
        const isCrimson = Math.random() > 0.5;
        tpCol[i * 3] = isCrimson ? 0.86 : 0.83;
        tpCol[i * 3 + 1] = isCrimson ? 0.08 : 0.69;
        tpCol[i * 3 + 2] = isCrimson ? 0.24 : 0.22;
    }
    const tpGeo = new THREE.BufferGeometry();
    tpGeo.setAttribute('position', new THREE.BufferAttribute(tpPos, 3));
    tpGeo.setAttribute('color', new THREE.BufferAttribute(tpCol, 3));
    transformationParticles = new THREE.Points(tpGeo, new THREE.PointsMaterial({
        size: 0.06, vertexColors: true, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending
    }));
    g.add(transformationParticles);
}

// AMBIENT DUST
function createDustParticles() {
    const count = 400;
    const positions = new Float32Array(count * 3);
    for (let i = 0; i < count; i++) {
        positions[i * 3] = (Math.random() - 0.5) * 16;
        positions[i * 3 + 1] = Math.random() * 8;
        positions[i * 3 + 2] = (Math.random() - 0.5) * 16;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    dustParticles = new THREE.Points(geo, new THREE.PointsMaterial({
        size: 0.025, color: 0xB76E79, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending
    }));
    scene.add(dustParticles);
}

// UI MANAGEMENT
function setupUI() {
    document.querySelectorAll('.room-dot').forEach(function(dot) {
        dot.addEventListener('click', function() {
            const target = parseInt(dot.dataset.room);
            if (target !== currentRoom && !isTransitioning) showRoom(target);
        });
    });

    document.getElementById('panel-close').addEventListener('click', closePanel);
    document.getElementById('panel-cta').addEventListener('click', function() {
        const title = document.getElementById('panel-title').textContent;
        alert('Added "' + title + '" to cart!');
    });
}

function showRoom(index, instant) {
    if (isTransitioning && !instant) return;
    isTransitioning = true;
    const room = ROOMS[index];
    currentRoom = index;

    // Update room label
    roomLabel.textContent = room.label;

    // Update dots
    document.querySelectorAll('.room-dot').forEach(function(d, i) {
        d.classList.toggle('active', i === index);
    });

    // Hide narrative and CTA
    narrativeEl.classList.remove('visible');
    shopCta.classList.remove('visible');
    closePanel();

    // Camera transition
    const duration = instant ? 0 : 1200;
    const startPos = { x: camera.position.x, y: camera.position.y, z: camera.position.z };
    const startTarget = { x: controls.target.x, y: controls.target.y, z: controls.target.z };
    const endPos = { x: room.camera.pos[0], y: room.camera.pos[1], z: room.camera.pos[2] };
    const endTarget = { x: room.camera.target[0], y: room.camera.target[1], z: room.camera.target[2] };
    const startTime = performance.now();

    function step(now) {
        const elapsed = now - startTime;
        const t = duration === 0 ? 1 : Math.min(elapsed / duration, 1);
        const ease = 1 - Math.pow(1 - t, 3);

        camera.position.x = startPos.x + (endPos.x - startPos.x) * ease;
        camera.position.y = startPos.y + (endPos.y - startPos.y) * ease;
        camera.position.z = startPos.z + (endPos.z - startPos.z) * ease;
        controls.target.x = startTarget.x + (endTarget.x - startTarget.x) * ease;
        controls.target.y = startTarget.y + (endTarget.y - startTarget.y) * ease;
        controls.target.z = startTarget.z + (endTarget.z - startTarget.z) * ease;

        if (t < 1) {
            requestAnimationFrame(step);
        } else {
            isTransitioning = false;
        }
    }

    if (duration > 0) {
        requestAnimationFrame(step);
    } else {
        camera.position.set(...room.camera.pos);
        controls.target.set(...room.camera.target);
        isTransitioning = false;
    }

    // Swap rooms
    roomGroups.forEach(function(g, i) { g.visible = i === index; });

    // Update fog
    scene.background.set(room.fog);
    scene.fog.color.set(room.fog);

    // Room 3 transformation effect
    if (index === 2) triggerTransformation();

    // Narrative fade-in after transition
    setTimeout(function() {
        narrativeText.textContent = room.narrative;
        narrativeEl.classList.add('visible');
        if (index === 2) shopCta.classList.add('visible');
    }, instant ? 100 : 800);

    // Build nav arrows
    buildNavArrows(room.nav);

    // Build hotspots
    buildHotspots(room.products);
}

function buildNavArrows(navItems) {
    while (navArrows.firstChild) navArrows.removeChild(navArrows.firstChild);
    navItems.forEach(function(item) {
        const btn = document.createElement('button');
        btn.className = 'nav-arrow';
        btn.textContent = item.text;
        btn.addEventListener('click', function() { showRoom(item.target); });
        navArrows.appendChild(btn);
    });
}

function buildHotspots(products) {
    while (hotspotsLayer.firstChild) hotspotsLayer.removeChild(hotspotsLayer.firstChild);
    products.forEach(function(p) {
        const spot = document.createElement('div');
        spot.className = 'hotspot';
        spot.style.left = p.screenPos[0] + '%';
        spot.style.top = p.screenPos[1] + '%';

        const ring = document.createElement('div');
        ring.className = 'hotspot-ring';
        spot.appendChild(ring);

        const label = document.createElement('div');
        label.className = 'hotspot-label';
        label.textContent = p.title + ' \u2014 ' + p.price;
        spot.appendChild(label);

        spot.addEventListener('click', function() { openPanel(p); });
        hotspotsLayer.appendChild(spot);
    });
}

function openPanel(product) {
    document.getElementById('panel-title').textContent = product.title;
    document.getElementById('panel-price').textContent = product.price;
    document.getElementById('panel-desc').textContent = product.desc;
    document.getElementById('panel-image').textContent = '';
    productPanel.classList.add('visible');
}

function closePanel() {
    productPanel.classList.remove('visible');
}

// TRANSFORMATION LIGHTING SHIFT
function triggerTransformation() {
    const g = roomGroups[2];
    const central = g.getObjectByName('transformCentralLight');
    const up1 = g.getObjectByName('transformUp1');
    const up2 = g.getObjectByName('transformUp2');
    if (!central) return;

    const startColor = new THREE.Color(0xDC143C);
    const endColor = new THREE.Color(0xD4AF37);
    const startUp = new THREE.Color(0x722F37);
    const endUp = new THREE.Color(0xB76E79);
    const duration = 2500;
    const startTime = performance.now();

    function step(now) {
        const t = Math.min((now - startTime) / duration, 1);
        const ease = t * t * (3 - 2 * t);
        central.color.copy(startColor).lerp(endColor, ease);
        central.intensity = 0.5 + ease * 3;
        if (up1) up1.color.copy(startUp).lerp(endUp, ease);
        if (up2) up2.color.copy(startUp).lerp(endUp, ease);
        if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
}

// ANIMATION LOOP
function animate() {
    requestAnimationFrame(animate);
    const time = clock.getElapsedTime();

    controls.update();

    // Dust drift
    if (dustParticles) {
        const dp = dustParticles.geometry.attributes.position.array;
        for (let i = 0; i < dp.length; i += 3) {
            dp[i + 1] += Math.sin(time * 0.4 + i * 0.3) * 0.002;
            if (dp[i + 1] > 8) dp[i + 1] = 0;
        }
        dustParticles.geometry.attributes.position.needsUpdate = true;
        dustParticles.rotation.y += 0.0002;
    }

    if (currentRoom === 0) animateBedroom(time);
    if (currentRoom === 1) animateBalcony(time);
    if (currentRoom === 2) animateTransformation(time);

    composer.render();
}

function animateBedroom(time) {
    const flameLight = roomLights[0][3];
    if (flameLight) {
        flameLight.intensity = 0.5 + Math.sin(time * 12) * 0.15 + Math.sin(time * 7.3) * 0.1;
    }
}

function animateBalcony(time) {
    if (enchantedRose) {
        enchantedRose.rotation.y = Math.sin(time * 0.3) * 0.1;
        const roseLight = roomLights[1][0];
        if (roseLight) {
            roseLight.intensity = 2.5 + Math.sin(time * 1.5) * 0.8;
        }
    }

    if (petalParticles) {
        const pp = petalParticles.geometry.attributes.position.array;
        for (let i = 0; i < pp.length; i += 3) {
            pp[i + 1] -= 0.004 + Math.sin(i + time) * 0.001;
            pp[i] += Math.sin(time * 0.8 + i * 0.5) * 0.002;
            if (pp[i + 1] < -0.5) {
                pp[i + 1] = 2 + Math.random();
                pp[i] = (Math.random() - 0.5) * 1.2;
                pp[i + 2] = (Math.random() - 0.5) * 1.2 - 2;
            }
        }
        petalParticles.geometry.attributes.position.needsUpdate = true;
    }
}

function animateTransformation(time) {
    if (transformationParticles) {
        const tp = transformationParticles.geometry.attributes.position.array;
        for (let i = 0; i < tp.length; i += 3) {
            tp[i + 1] += Math.sin(time * 1.2 + i * 0.2) * 0.006;
            tp[i] += Math.cos(time * 0.5 + i * 0.3) * 0.003;
            if (tp[i + 1] > 8) tp[i + 1] = 0;
            if (tp[i + 1] < 0) tp[i + 1] = 8;
        }
        transformationParticles.geometry.attributes.position.needsUpdate = true;
        transformationParticles.rotation.y += 0.001;
    }
}

function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
}

init();

</script>
