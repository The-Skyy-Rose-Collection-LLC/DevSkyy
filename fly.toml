# fly.toml app configuration file generated for devskyy-mz1-ow on 2026-06-16T00:47:21Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'devskyy-mz1-ow'
primary_region = 'ams'
kill_signal = 'SIGTERM'
kill_timeout = '30s'

[build]

[env]
  CORS_ORIGINS = 'https://app.devskyy.app,https://api.devskyy.app,https://*.devskyy.app'
  DATABASE_CONNECT_TIMEOUT = '10'
  DATABASE_MAX_OVERFLOW = '10'
  DATABASE_POOL_RECYCLE = '3600'
  DATABASE_POOL_SIZE = '5'
  DATABASE_POOL_TIMEOUT = '5'
  ENVIRONMENT = 'production'
  KEEPALIVE_TIMEOUT_SECONDS = '65'
  LOGIN_LOCKOUT_MINUTES = '15'
  LOG_JSON = 'true'
  LOG_LEVEL = 'INFO'
  MAX_LOGIN_ATTEMPTS = '5'
  MAX_REQUEST_BODY_SIZE = '10485760'
  PYTHONDONTWRITEBYTECODE = '1'
  PYTHONUNBUFFERED = '1'
  RAG_AUTO_INGEST = 'false'
  RAG_ENABLE_RERANKING = 'false'
  RAG_ENABLE_REWRITING = 'false'
  REDIS_CONNECT_TIMEOUT = '2.0'
  REDIS_MAX_CONNECTIONS = '10'
  REDIS_RETRY_ON_TIMEOUT = 'true'
  REDIS_SOCKET_TIMEOUT = '2.0'
  REQUEST_TIMEOUT_SECONDS = '60'
  SENTRY_ENVIRONMENT = 'production'
  SENTRY_PROFILES_SAMPLE_RATE = '0.05'
  SENTRY_TRACES_SAMPLE_RATE = '0.1'
  SESSION_TIMEOUT_MINUTES = '60'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '15s'
    timeout = '10s'
    grace_period = '1m0s'
    method = 'GET'
    path = '/health'
    protocol = 'http'
    tls_skip_verify = false

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '1m0s'
    method = 'GET'
    path = '/ready'
    protocol = 'http'
    tls_skip_verify = false

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[[statics]]
  guest_path = '/app/public'
  url_prefix = '/static'

[[metrics]]
  port = 8000
  path = '/metrics'
