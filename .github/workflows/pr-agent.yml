# =============================================================================
# PR Intelligence Agent — Auto-Trigger
# =============================================================================
# Runs the PR Intelligence Agent when PRs are opened, updated, or commented on.
# The agent analyzes the PR, fixes issues, and takes the best action.
#
# Uses anthropics/claude-code-action to invoke the pr-automator agent.
# =============================================================================

name: PR Intelligence Agent

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  issue_comment:
    types: [created]

# Only run one instance per PR at a time
concurrency:
  group: pr-agent-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  pr-agent:
    name: PR Agent Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Non-gating: reporting agent that rejects bot actors and gets concurrency-cancelled,
    # leaving CANCELLED/failed states that aren't real code failures. Don't block merges.
    continue-on-error: true

    # Skip draft PRs and bot comments (except on PR events from dependabot)
    if: |
      (github.event_name == 'pull_request' && !github.event.pull_request.draft) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && !github.event.comment.user.type == 'Bot')

    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          fetch-depth: 0

      - name: Determine PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run PR Intelligence Agent
        uses: anthropics/claude-code-action@35037bb980d9bc03f0f74b65b68618b0be46c268  # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are the PR Intelligence Agent. Analyze PR #${{ steps.pr.outputs.number }} in this repository.

            1. Read the full diff: gh pr diff ${{ steps.pr.outputs.number }}
            2. Read all comments: gh api repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.number }}/comments
            3. Read reviews: gh api repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.number }}/reviews
            4. Check CI status: gh pr checks ${{ steps.pr.outputs.number }}

            Classify the PR:
            - Category: dependabot-dep | feature | fix | refactor | cleanup | security | ci | docs
            - Significance: 1 (trivial) to 5 (critical)

            Then decide:
            - If Dependabot minor/patch dep bump: comment "Will be batched in next /pr-auto audit run"
            - If Dependabot security-critical: approve and comment "Security patch — ready for immediate merge"
            - If clean code + CI passing + significance <= 2: approve and comment "Clean PR — ready to merge"
            - If fixable issues (formatting, lint): push a fix commit, then re-evaluate
            - If code quality issues: comment with detailed findings using this format:
              [CRITICAL|HIGH|MEDIUM|LOW] file:line — Issue description
            - If human reviewer already requested changes: skip — do not override

            Always end your comment with a summary:
            **Category**: X | **Significance**: N/5 | **Recommendation**: merge/fix/hold/needs-discussion
