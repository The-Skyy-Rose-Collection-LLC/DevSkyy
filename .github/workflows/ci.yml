# =============================================================================
# DevSkyy Production CI/CD Pipeline
# =============================================================================
# Comprehensive testing, security scanning, and deployment pipeline
# Supports: Python backend, Next.js frontend, Three.js, Playwright e2e
#
# Lint and tests run in parallel for fast feedback.
# Deployment jobs gate on both lint and tests passing.
# Security gates block deployment on critical vulnerabilities.
# =============================================================================

name: DevSkyy CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekly security scan on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      skip_e2e:
        description: 'Skip Playwright e2e tests'
        required: false
        default: false
        type: boolean
      force_deploy:
        description: 'Force deployment (skip some checks)'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Cancel in-progress runs for same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Stage 1: Lint & Static Analysis (Fast Feedback)
  # ===========================================================================
  lint:
    name: 🔍 Lint & Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Get pip cache dir
        id: pip-cache
        shell: bash
        run: |
          echo "dir=$(pip cache dir)" >> $GITHUB_OUTPUT

      - name: Cache pip dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ${{ steps.pip-cache.outputs.dir }}
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black isort mypy

      - name: Run ruff (fast linter)
        run: ruff check . --output-format=github

      - name: Check black formatting
        run: black --check --diff .

      - name: Check isort imports
        run: isort --check-only --diff .

      - name: Cache mypy
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: .mypy_cache
          key: ${{ runner.os }}-mypy-${{ hashFiles('**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-mypy-

      - name: Run mypy type checking
        run: mypy . --ignore-missing-imports --no-error-summary

  # ===========================================================================
  # Stage 2: Python Backend Tests
  # ===========================================================================
  python-tests:
    name: 🐍 Python Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp]" || pip install -e ".[dev]" || pip install -e .
          pip install pytest pytest-asyncio pytest-cov pytest-xdist httpx
          # Optional deps the test suite imports (langgraph comes from the [mcp]
          # extra above with a compatible pin; the rest are standalone). No
          # `|| true` mask — if these fail to install we want the job to say so,
          # not silently skip the tests that need them.
          pip install boto3 scikit-image trimesh pyotp

      - name: Cache pytest
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: .pytest_cache
          key: ${{ runner.os }}-pytest-${{ hashFiles('tests/**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-pytest-

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            -v \
            --cov=. \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --junitxml=pytest-results.xml \
            -n auto \
            --ignore=tests/e2e
        env:
          PYTHONPATH: ${{ github.workspace }}
          REDIS_URL: redis://localhost:6379/0
          MINIMUM_FIDELITY_SCORE: "95.0"

      - name: Upload coverage to Codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          curl -Os https://cli.codecov.io/latest/linux/codecov
          chmod +x codecov
          ./codecov --verbose upload-process \
            --fail-on-error=false \
            -t "$CODECOV_TOKEN" \
            -f coverage.xml \
            -F python || true

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: python-test-results
          path: |
            pytest-results.xml
            htmlcov/
          retention-days: 7

  # ===========================================================================
  # Stage 2: Security Scanning (Parallel with Tests)
  # ===========================================================================
  security:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" || pip install -e .
          pip install pip-audit bandit safety
          # semgrep wheel build fails on Python 3.12 from source; use pipx isolation
          pipx install semgrep || pip install semgrep || true

      - name: Run pip-audit (dependency vulnerabilities)
        id: pip_audit
        run: |
          pip_audit_status=0
          # Targeted ignores: CVEs with NO fixed release in any version (cannot be
          # bumped away). Documented + revisited when upstreams publish a fix.
          #   chromadb     CVE-2026-45829   (no patched release)
          #   torch        PYSEC-2026-139, CVE-2025-3000   (no patched release)
          #   transformers PYSEC-2025-217   (no patched release)
          IGNORE="--ignore-vuln CVE-2026-45829 --ignore-vuln PYSEC-2026-139 --ignore-vuln CVE-2025-3000 --ignore-vuln PYSEC-2025-217"
          pip-audit $IGNORE --format=json --output=pip-audit-results.json || pip_audit_status=$?
          pip-audit $IGNORE --strict 2>&1 | tee pip-audit.txt || pip_audit_status=$?
          echo "pip_audit_exit=$pip_audit_status" >> "$GITHUB_OUTPUT"

      - name: Run bandit (code security)
        id: bandit
        run: |
          bandit_status=0
          bandit -r . \
            -x ./tests,./venv,./.venv,./node_modules \
            -f json -o bandit-results.json \
            -ll || bandit_status=$?
          bandit -r . \
            -x ./tests,./venv,./.venv,./node_modules \
            -ll 2>&1 | tee bandit.txt || bandit_status=$?
          echo "bandit_exit=$bandit_status" >> "$GITHUB_OUTPUT"

      - name: Run safety check
        id: safety
        run: |
          safety_status=0
          safety check --full-report 2>&1 | tee safety.txt || safety_status=$?
          echo "safety_exit=$safety_status" >> "$GITHUB_OUTPUT"

      - name: Run semgrep (SAST)
        id: semgrep
        run: |
          semgrep_status=0
          semgrep scan --config=auto --error --json --output=semgrep-results.json . || semgrep_status=$?
          semgrep scan --config=auto --error . 2>&1 | tee semgrep.txt || semgrep_status=$?
          echo "semgrep_exit=$semgrep_status" >> "$GITHUB_OUTPUT"
        env:
          SEMGREP_RULES: "p/python"

      - name: Run custom security audit
        run: |
          if [ -f "scripts/security_audit.py" ]; then
            # Run audit; capture exit code but treat as advisory (findings need human review
            # before merge, not a hard CI block — false positives exist in SQLAlchemy compiled queries)
            python scripts/security_audit.py --report security-report.json || \
              echo "::warning::Custom security audit found issues — review security-report.json before merging"
          else
            echo "No custom security audit script found"
          fi

      - name: Generate security summary
        if: always()
        run: |
          echo "## 🔐 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # pip-audit summary
          if [ -f pip-audit-results.json ]; then
            VULN_COUNT=$(jq '. | length' pip-audit-results.json 2>/dev/null || echo "0")
            echo "### pip-audit: $VULN_COUNT dependency vulnerabilities" >> $GITHUB_STEP_SUMMARY
          fi

          # bandit summary
          if [ -f bandit-results.json ]; then
            HIGH=$(jq '[.results[] | select(.issue_severity == "HIGH")] | length' bandit-results.json 2>/dev/null || echo "0")
            MED=$(jq '[.results[] | select(.issue_severity == "MEDIUM")] | length' bandit-results.json 2>/dev/null || echo "0")
            echo "### bandit: $HIGH high, $MED medium severity issues" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload security reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: security-reports
          path: |
            pip-audit*.json
            pip-audit*.txt
            bandit*.json
            bandit*.txt
            safety.txt
            semgrep*.json
            semgrep*.txt
            security-report.*
          retention-days: 30

      - name: Fail on security findings
        if: always()
        run: |
          failed=0
          # Only fail when exit code is explicitly non-zero (empty = tool did not run = skip)
          pip_exit="${{ steps.pip_audit.outputs.pip_audit_exit }}"
          bandit_exit="${{ steps.bandit.outputs.bandit_exit }}"
          semgrep_exit="${{ steps.semgrep.outputs.semgrep_exit }}"

          if [ -n "$pip_exit" ] && [ "$pip_exit" != "0" ]; then
            echo "::error::pip-audit found FIXABLE dependency vulnerabilities (exit $pip_exit) — bump the flagged packages, or add a documented --ignore-vuln only if there is no upstream fix"
            failed=1
          fi
          if [ -n "$bandit_exit" ] && [ "$bandit_exit" != "0" ]; then
            echo "::warning::bandit found MEDIUM/LOW issues (exit $bandit_exit) — informational"
          fi
          if [ -n "$semgrep_exit" ] && [ "$semgrep_exit" != "0" ]; then
            echo "::warning::semgrep found SAST issues (exit $semgrep_exit) — informational"
          fi
          # BLOCKING: Critical bandit issues only (HIGH severity + HIGH confidence)
          if [ -f bandit-results.json ]; then
            CRITICAL=$(jq '[.results[] | select(.issue_severity == "HIGH" and .issue_confidence == "HIGH")] | length' bandit-results.json 2>/dev/null || echo "0")
            if [ "$CRITICAL" -gt 0 ]; then
              echo "::error::Found $CRITICAL critical security issues (HIGH severity + HIGH confidence)"
              failed=1
            fi
          fi
          if [ "$failed" -ne 0 ]; then
            echo "Security scan failures detected — review reports above"
            exit 1
          fi
          echo "Security scan complete (non-critical findings above are informational)"

  # ===========================================================================
  # Stage 2: Frontend Tests (Parallel)
  # ===========================================================================
  frontend-tests:
    name: ⚛️ Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run type-check

      - name: Build application
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: frontend-build
          path: frontend/.next/
          retention-days: 1
          include-hidden-files: true  # .next/ is a hidden dir; upload-artifact v6 skips it without this

  # ===========================================================================
  # Stage 2: Three.js Collection Tests (Parallel)
  # ===========================================================================
  threejs-tests:
    name: 🎮 Three.js Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Root project has no committed package-lock.json; use `npm install`
      # (not `npm ci`) and skip npm cache, which requires a lockfile to key on.
      - name: Install dependencies
        run: npm install

      - name: Run Three.js collection tests
        run: npm run test:collections

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: threejs-test-results
          path: coverage/
          retention-days: 7

  # ===========================================================================
  # Stage 2: WordPress Theme Validation (Parallel)
  # ===========================================================================
  wordpress-theme:
    name: "🏗️ WordPress Theme"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: PHP syntax check (CI-03)
        run: |
          error_count=0
          while IFS= read -r file; do
            if ! output=$(php -l "$file" 2>&1); then
              echo "::error file=$file::PHP syntax error: $output"
              error_count=$((error_count + 1))
            fi
          done < <(find wordpress-theme/skyyrose-flagship \
            -name "*.php" \
            -not -path "*/node_modules/*" \
            -not -path "*/vendor/*")
          if [ "$error_count" -gt 0 ]; then
            echo "$error_count PHP file(s) have syntax errors"
            exit 1
          fi
          echo "All PHP files passed syntax check"

      # package.json + build scripts live in wordpress-theme/ (the build:css/build:js
      # scripts reference the skyyrose-flagship/ subdir). Running from the subdir
      # itself fails with ENOENT (no package.json there).
      - name: Install theme dependencies
        working-directory: wordpress-theme
        run: npm install

      - name: Build theme assets (CI-04)
        working-directory: wordpress-theme
        run: npm run build

      - name: Check for minification drift (CI-05)
        run: |
          if git status --porcelain --untracked-files=all -- wordpress-theme/skyyrose-flagship \
            | grep -Eq '\.min\.(js|css)$'; then
            echo ""
            echo "::error::Minification drift detected! Build output differs from committed .min files."
            echo "Fix: cd wordpress-theme/skyyrose-flagship && npm run build && git add -A && git commit"
            exit 1
          fi
          echo "No minification drift -- build output is clean"

  # ===========================================================================
  # Stage 3: E2E Tests with Playwright
  # ===========================================================================
  e2e-tests:
    name: 🎭 Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Non-gating: E2E suite is nascent / not yet CI-stable. Still runs for visibility,
    # but does not block merges until the suite is hardened (see settings-page.spec follow-up).
    continue-on-error: true
    needs: [python-tests, frontend-tests]
    if: ${{ !inputs.skip_e2e }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install -e ".[dev,mcp]" || pip install -e ".[dev]" || pip install -e .
          pip install uvicorn
          # main_enterprise:app imports these optional deps transitively; without
          # them the backend server fails to boot (ModuleNotFoundError) and the
          # Playwright run hangs until the job is cancelled.
          pip install boto3 scikit-image trimesh pyotp

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright
        # Install inside frontend/ so the binary that runs tests is the same one
        # that downloads browsers. npx resolves the Python playwright first (v1.60,
        # headless-shell-1208) which conflicts with the Node @playwright/test version.
        # Using ./node_modules/.bin/playwright from the same directory avoids the mismatch.
        working-directory: frontend
        run: |
          npm install -D @playwright/test
          # mobile project uses iPhone 14 (WebKit engine), chromium for Desktop Chrome.
          ./node_modules/.bin/playwright install --with-deps chromium webkit

      - name: Download frontend build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: frontend-build
          path: frontend/.next/

      - name: Start backend server
        run: |
          python -m uvicorn main_enterprise:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for backend to start..."
          for i in $(seq 1 30); do curl -sf http://localhost:8000/health && break || sleep 2; done
        env:
          PYTHONPATH: ${{ github.workspace }}
          REDIS_URL: redis://localhost:6379/0

      - name: Start frontend server
        run: |
          npm run start &
          echo "Waiting for frontend to start..."
          for i in $(seq 1 30); do curl -sf http://localhost:3000 && break || sleep 2; done
        working-directory: frontend
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Run Playwright tests
        # Step-level cap: a slow/failing E2E suite fails HERE (step failure, absorbed by this
        # job's continue-on-error) instead of running to the 30-min JOB timeout, which fires as
        # a cancellation that continue-on-error cannot absorb — that gated the pipeline.
        timeout-minutes: 15
        # `--reporter=list,html`: the `list` reporter streams per-test results to the
        # CI log (a bare `--reporter=html` overrode the config's list reporter, so the
        # run produced ZERO output and the 15-min timeout was a black box — you could
        # not tell which test hung). `html` is kept for the uploaded report artifact.
        # `--max-failures=10`: bail fast instead of grinding 42 serial tests (workers=1,
        # retries=2 = up to 90s each) past the 15-min cap with no signal.
        run: ./node_modules/.bin/playwright test --reporter=list,html --max-failures=10
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          API_BASE_URL: http://localhost:8000

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload Playwright traces
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: failure()
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 7

  # ===========================================================================
  # Stage 3: API Integration Tests
  # ===========================================================================
  api-integration:
    name: 🔌 API Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [python-tests]

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev,mcp]" || pip install -e ".[dev]" || pip install -e .
          pip install httpx pytest-asyncio boto3

      - name: Run API integration tests
        run: |
          pytest tests/test_*api*.py tests/test_*dashboard*.py \
            -v \
            --junitxml=api-test-results.xml
        env:
          REDIS_URL: redis://localhost:6379/0
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload API test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: api-test-results
          path: api-test-results.xml
          retention-days: 7

  # ===========================================================================
  # Stage 4: Docker Build
  # ===========================================================================
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    # The .[all] backend image pulls the full ML stack (torch+CUDA, transformers,
    # mineru, chromadb, faiss, sentence-transformers) — a multi-GB image whose
    # build + GHCR push legitimately exceeds 20 min cold. Deps now resolve (aiofiles
    # cap); the only remaining failure was this timeout. 45 min fits the real build.
    timeout-minutes: 45
    needs: [python-tests, frontend-tests, security]
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4

      # Path filter (2026-07-07): the GHCR image this job pushes has NO deploy
      # consumer (deploys are gated manual runs; see tasks/mcp-golive-manifest.md
      # and the P5 Fly backend plan). A 20-45 min multi-GB build on every main
      # push is pure cost unless build inputs actually changed — skip otherwise.
      - name: Detect build-relevant changes
        id: changes
        run: |
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] \
             || ! git fetch --quiet --depth=1 origin "$BEFORE" 2>/dev/null; then
            echo "build=true" >> "$GITHUB_OUTPUT"  # unknown base — build to be safe
            exit 0
          fi
          if git diff --name-only "$BEFORE" "${{ github.sha }}" \
             | grep -qE '^(Dockerfile$|pyproject\.toml$|frontend/Dockerfile$|frontend/package(-lock)?\.json$)'; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Docker build skipped — no build-relevant files changed (Dockerfile, pyproject.toml, frontend/Dockerfile, frontend/package*.json)"
          fi

      - name: Set up Docker Buildx
        if: steps.changes.outputs.build == 'true'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: Log in to GitHub Container Registry
        if: steps.changes.outputs.build == 'true' && github.ref == 'refs/heads/main'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        if: steps.changes.outputs.build == 'true'
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build backend image
        if: steps.changes.outputs.build == 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}-backend
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Build frontend image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}-frontend
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
        if: steps.changes.outputs.build == 'true' && hashFiles('frontend/Dockerfile') != ''

  # ===========================================================================
  # Stage 4.5: [all] extras resolvability canary
  # ===========================================================================
  # Dependabot has broken the [all] extras graph 6 times (torch trio, aiofiles,
  # cryptography, click, beautifulsoup4, mlflow) — each found LATE, at Docker
  # build time. This canary resolves the full graph in ~1-2 min on any PR that
  # touches pyproject.toml, failing fast instead. (Added 2026-07-07, P4.)
  deps-resolve-canary:
    name: 🧪 Deps Canary ([all] resolves)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4

      - name: Check whether pyproject.toml changed in this PR
        id: touched
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          if ! git fetch --quiet --depth=1 origin "$BASE" 2>/dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"  # unknown base — check to be safe
            exit 0
          fi
          if git diff --name-only "$BASE" HEAD -- pyproject.toml | grep -q pyproject.toml; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::pyproject.toml untouched — dependency canary skipped"
          fi

      - name: Set up Python
        if: steps.touched.outputs.changed == 'true'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Resolve [all] extras
        if: steps.touched.outputs.changed == 'true'
        run: |
          pip install --quiet uv
          # Resolution only — nothing is downloaded/installed. Flags verified
          # against uv 0.11.x (--extra, --python-version, -o).
          uv pip compile pyproject.toml --extra all --python-version "${{ env.PYTHON_VERSION }}" -o /dev/null

  # ===========================================================================
  # Stage 5: Deploy to Staging
  # ===========================================================================
  deploy-staging:
    name: 🚀 Deploy Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [python-tests, frontend-tests, security, api-integration]
    # DISABLED 2026-07-07: Render deploy hooks are inert (secrets never configured,
    # no render.yaml exists) and the URLs reference the wrong domain (skyyrose.com;
    # live site is skyyrose.co). Real deploys are gated manual runs — see
    # tasks/mcp-golive-manifest.md; backend production home is the planned Fly app
    # (P5, ~/.claude/plans/lucky-nibbling-oasis.md). Re-enable only with a real target.
    if: false
    environment:
      name: staging
      url: https://staging.skyyrose.com

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4

      - name: Deploy frontend to Vercel
        if: ${{ vars.ENABLE_VERCEL_DEPLOY == 'true' }}
        working-directory: ./frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel
          vercel pull --yes --environment=preview --token=$VERCEL_TOKEN
          vercel build --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --token=$VERCEL_TOKEN

      - name: Deploy backend to Render
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
            echo "Backend deployment triggered"
          else
            echo "::warning::RENDER_DEPLOY_HOOK not configured"
          fi

      - name: Notify deployment
        run: |
          echo "## 🚀 Staging Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: staging" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Stage 5: Deploy to Production
  # ===========================================================================
  deploy-production:
    name: 🌐 Deploy Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [python-tests, frontend-tests, security, api-integration, e2e-tests]
    # DISABLED 2026-07-07: same reasons as deploy-staging (inert Render hooks, wrong
    # domain) — and this job's needs included the explicitly non-gating e2e suite,
    # making the "gate" theater. Production deploys are STOP-AND-SHOW manual runs.
    if: false
    environment:
      name: production
      url: https://skyyrose.com

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4

      - name: Security gate check
        run: |
          echo "Verifying all security checks passed..."
          # This step runs after security job succeeds

      - name: Deploy frontend to Vercel (Production)
        if: ${{ vars.ENABLE_VERCEL_DEPLOY == 'true' }}
        working-directory: ./frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

      - name: Deploy backend to Render (Production)
        run: |
          if [ -n "${{ secrets.RENDER_PROD_DEPLOY_HOOK }}" ]; then
            curl -X POST "${{ secrets.RENDER_PROD_DEPLOY_HOOK }}"
            echo "Production backend deployment triggered"
          else
            echo "::warning::RENDER_PROD_DEPLOY_HOOK not configured"
          fi

      - name: Create deployment tag
        if: success()
        run: |
          TAG="deploy-$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Production deployment ${GITHUB_SHA::7}"
          git push origin "$TAG" || echo "::warning::Could not push tag $TAG"

      - name: Notify deployment success
        run: |
          echo "## 🌐 Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Deployment successful!**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: production" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://skyyrose.com" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Workflow Summary
  # ===========================================================================
  summary:
    name: 📊 Pipeline Summary
    runs-on: ubuntu-latest
    needs: [lint, python-tests, security, frontend-tests, threejs-tests, wordpress-theme]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## 📊 CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐍 Python Tests | ${{ needs.python-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔐 Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚛️ Frontend | ${{ needs.frontend-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎮 Three.js | ${{ needs.threejs-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ WordPress Theme | ${{ needs.wordpress-theme.result }} |" >> $GITHUB_STEP_SUMMARY
