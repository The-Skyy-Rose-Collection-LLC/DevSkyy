<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyyRose — Product Classifier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #060606;
      --surface: #0e0e0e;
      --surface-raised: #141414;
      --surface-hover: #1a1a1a;
      --border: #1f1f1f;
      --border-subtle: #161616;
      --text: #ece5dd;
      --text-dim: #9a8f83;
      --text-muted: #5c554c;
      --rose: #B76E79;
      --rose-dim: rgba(183, 110, 121, 0.15);
      --rose-glow: rgba(183, 110, 121, 0.3);
      --deep-red: #8B0000;
      --deep-red-dim: rgba(139, 0, 0, 0.15);
      --gold: #D4AF37;
      --gold-dim: rgba(212, 175, 55, 0.12);
      --green: #3a9e5c;
      --green-dim: rgba(58, 158, 92, 0.12);
      --exclude: #5a2a2a;
      --exclude-dim: rgba(90, 42, 42, 0.12);
      --font-display: 'Cormorant Garamond', 'Georgia', serif;
      --font-ui: 'Syne', 'Helvetica Neue', sans-serif;
      --radius: 6px;
      --radius-lg: 10px;
    }

    html { font-size: 15px; -webkit-font-smoothing: antialiased; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ─────────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(6,6,6,0.88);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border-bottom: 1px solid var(--border-subtle);
      padding: 16px 32px;
      display: flex; align-items: center; gap: 24px;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 1.6rem; font-weight: 300;
      letter-spacing: 0.08em; color: var(--rose);
      white-space: nowrap;
    }
    .logo em {
      font-style: italic; font-weight: 300;
      color: var(--text-dim); font-size: 0.85em;
      margin-left: 8px; letter-spacing: 0.04em;
    }

    .progress-wrap {
      flex: 1; display: flex; align-items: center; gap: 12px;
    }
    .progress-bar {
      flex: 1; height: 3px; background: var(--border);
      border-radius: 2px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--rose), var(--gold));
      border-radius: 2px;
      transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .progress-label {
      font-size: 0.73rem; color: var(--text-muted);
      font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; white-space: nowrap;
    }

    .export-btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--text-dim); font-family: var(--font-ui);
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 8px 18px; border-radius: var(--radius);
      cursor: pointer; transition: all 0.25s ease;
      white-space: nowrap;
    }
    .export-btn:hover {
      border-color: var(--rose); color: var(--rose);
      box-shadow: 0 0 20px var(--rose-dim);
    }

    /* ── NAV ────────────────────────────────────────── */
    nav {
      position: sticky; top: 56px; z-index: 90;
      background: rgba(6,6,6,0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-subtle);
      padding: 0 32px;
      display: flex; align-items: center; gap: 4px;
      overflow-x: auto;
    }

    .tab {
      background: none; border: none;
      font-family: var(--font-ui);
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-muted); padding: 14px 16px;
      cursor: pointer; transition: color 0.2s;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
    }
    .tab:hover { color: var(--text-dim); }
    .tab.active { color: var(--text); border-bottom-color: var(--rose); }

    .nav-spacer { flex: 1; }

    .filter-group {
      display: flex; gap: 3px; padding: 6px 0;
    }
    .filter-pill {
      background: var(--surface); border: 1px solid var(--border-subtle);
      color: var(--text-muted); font-family: var(--font-ui);
      font-size: 0.62rem; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 5px 10px; border-radius: 20px;
      cursor: pointer; transition: all 0.2s;
    }
    .filter-pill:hover { border-color: var(--border); color: var(--text-dim); }
    .filter-pill.active { background: var(--rose-dim); border-color: var(--rose); color: var(--rose); }

    /* ── MAIN GRID ──────────────────────────────────── */
    main { padding: 28px 32px 120px; }

    .collection-section { margin-bottom: 48px; }

    .collection-header {
      display: flex; align-items: baseline; gap: 16px;
      margin-bottom: 20px; padding-bottom: 12px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .collection-name {
      font-family: var(--font-display);
      font-size: 1.8rem; font-weight: 300;
      letter-spacing: 0.06em;
    }
    .collection-count {
      font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-muted);
    }
    .collection-accent {
      width: 28px; height: 2px; border-radius: 1px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    /* ── PRODUCT CARD ───────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: border-color 0.35s, box-shadow 0.35s, transform 0.3s;
      position: relative;
    }
    .card:hover {
      border-color: var(--border);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }
    .card.classified-preorder {
      border-color: rgba(212,175,55,0.3);
      box-shadow: 0 0 30px var(--gold-dim);
    }
    .card.classified-ready {
      border-color: rgba(58,158,92,0.3);
      box-shadow: 0 0 30px var(--green-dim);
    }
    .card.classified-exclude {
      border-color: rgba(90,42,42,0.3);
      opacity: 0.55;
    }

    /* Image area */
    .card-img {
      position: relative; width: 100%;
      aspect-ratio: 4 / 5;
      background: #0a0a0a;
      overflow: hidden;
    }
    .card-img img {
      width: 100%; height: 100%;
      object-fit: contain;
      transition: opacity 0.4s ease;
    }
    .card-img img.loading { opacity: 0; }

    .img-nav {
      position: absolute; bottom: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: center;
      gap: 6px; padding: 12px;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
    }
    .img-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.25);
      border: none; cursor: pointer;
      transition: all 0.2s;
    }
    .img-dot.active { background: var(--rose); transform: scale(1.3); }
    .img-dot:hover { background: rgba(255,255,255,0.5); }

    .img-label {
      position: absolute; top: 10px; left: 10px;
      font-size: 0.58rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      background: rgba(0,0,0,0.5);
      padding: 3px 8px; border-radius: 3px;
      backdrop-filter: blur(8px);
    }

    .img-counter {
      position: absolute; top: 10px; right: 10px;
      font-size: 0.6rem; font-weight: 600;
      color: rgba(255,255,255,0.4);
    }

    .img-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 32px; height: 32px;
      background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.6);
      font-size: 0.8rem;
      transition: all 0.2s;
      opacity: 0;
    }
    .card:hover .img-arrow { opacity: 1; }
    .img-arrow:hover {
      background: rgba(0,0,0,0.7);
      border-color: rgba(255,255,255,0.2);
      color: white;
    }
    .img-arrow.left { left: 8px; }
    .img-arrow.right { right: 8px; }

    .no-img {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 0.75rem;
      font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* Card info */
    .card-info { padding: 16px 18px 14px; }

    .card-meta {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 6px;
    }
    .card-id {
      font-size: 0.6rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-muted);
      background: var(--surface-raised);
      padding: 2px 7px; border-radius: 3px;
    }
    .card-collection {
      font-size: 0.58rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 2px 7px; border-radius: 3px;
    }

    .card-name {
      font-family: var(--font-display);
      font-size: 1.25rem; font-weight: 400;
      line-height: 1.3; margin-bottom: 6px;
      color: var(--text);
    }

    .card-desc {
      font-size: 0.72rem; line-height: 1.55;
      color: var(--text-dim);
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
      margin-bottom: 14px;
    }

    /* Classification buttons */
    .card-actions {
      display: flex; gap: 6px;
    }
    .classify-btn {
      flex: 1; padding: 9px 6px;
      font-family: var(--font-ui);
      font-size: 0.62rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.25s ease;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
    }
    .classify-btn:hover {
      transform: translateY(-1px);
    }

    .classify-btn.preorder:hover,
    .classify-btn.preorder.selected {
      background: var(--gold-dim);
      border-color: var(--gold);
      color: var(--gold);
      box-shadow: 0 4px 16px var(--gold-dim);
    }
    .classify-btn.ready:hover,
    .classify-btn.ready.selected {
      background: var(--green-dim);
      border-color: var(--green);
      color: var(--green);
      box-shadow: 0 4px 16px var(--green-dim);
    }
    .classify-btn.exclude:hover,
    .classify-btn.exclude.selected {
      background: var(--exclude-dim);
      border-color: var(--exclude);
      color: #9a5555;
      box-shadow: 0 4px 16px var(--exclude-dim);
    }

    /* ── EXPORT MODAL ───────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      width: 580px; max-width: 92vw;
      max-height: 85vh; overflow-y: auto;
      padding: 28px;
    }
    .modal h2 {
      font-family: var(--font-display);
      font-size: 1.5rem; font-weight: 400;
      margin-bottom: 6px;
    }
    .modal p {
      font-size: 0.75rem; color: var(--text-dim);
      margin-bottom: 18px;
    }
    .modal pre {
      background: var(--bg);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      padding: 16px;
      font-size: 0.72rem; line-height: 1.6;
      color: var(--text-dim);
      overflow-x: auto;
      max-height: 400px;
    }
    .modal-actions {
      display: flex; gap: 8px; margin-top: 16px;
      justify-content: flex-end;
    }
    .modal-btn {
      padding: 9px 20px; border-radius: var(--radius);
      font-family: var(--font-ui);
      font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
    }
    .modal-btn.primary {
      background: var(--rose); border: none;
      color: white;
    }
    .modal-btn.primary:hover { filter: brightness(1.15); }
    .modal-btn.ghost {
      background: none; border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .modal-btn.ghost:hover { border-color: var(--text-muted); }

    /* ── FOOTER STATS ───────────────────────────────── */
    .footer-stats {
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 80;
      background: rgba(6,6,6,0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--border-subtle);
      padding: 12px 32px;
      display: flex; align-items: center; gap: 24px;
      font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    .stat { display: flex; align-items: center; gap: 6px; }
    .stat-dot {
      width: 8px; height: 8px; border-radius: 50%;
    }
    .stat-dot.preorder { background: var(--gold); }
    .stat-dot.ready { background: var(--green); }
    .stat-dot.exclude { background: var(--exclude); }
    .stat-dot.unset { background: var(--text-muted); }
    .stat-count { color: var(--text); }
    .stat-label { color: var(--text-muted); }

    /* ── ANIMATIONS ─────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card {
      animation: fadeUp 0.5s ease both;
    }

    /* ── RESPONSIVE ─────────────────────────────────── */
    @media (max-width: 768px) {
      header, nav, main { padding-left: 16px; padding-right: 16px; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
      .logo em { display: none; }
      .footer-stats { padding: 10px 16px; gap: 14px; flex-wrap: wrap; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">SkyyRose<em>Product Classifier</em></div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel">0 / 0</div>
    </div>
    <button class="export-btn" id="exportBtn">Export JSON</button>
  </header>

  <nav>
    <button class="tab active" data-filter="all">All</button>
    <button class="tab" data-filter="black-rose">Black Rose</button>
    <button class="tab" data-filter="love-hurts">Love Hurts</button>
    <button class="tab" data-filter="signature">Signature</button>
    <button class="tab" data-filter="uncatalogued">Uncatalogued</button>
    <div class="nav-spacer"></div>
    <div class="filter-group">
      <button class="filter-pill active" data-status="all">All</button>
      <button class="filter-pill" data-status="unset">Unset</button>
      <button class="filter-pill" data-status="preorder">Pre-Order</button>
      <button class="filter-pill" data-status="ready">Ready</button>
      <button class="filter-pill" data-status="exclude">Exclude</button>
    </div>
  </nav>

  <main id="gallery"></main>

  <div class="footer-stats" id="footerStats"></div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2>Classification Export</h2>
      <p>Copy this JSON to configure WooCommerce product statuses.</p>
      <pre id="exportOutput"></pre>
      <div class="modal-actions">
        <button class="modal-btn ghost" id="modalClose">Close</button>
        <button class="modal-btn primary" id="modalCopy">Copy to Clipboard</button>
      </div>
    </div>
  </div>

<script>
// ═══════════════════════════════════════════════════════════════
// DATA — Product Catalog
// ═══════════════════════════════════════════════════════════════

// Uncatalogued products (from image_mappings without catalog IDs)
const UNCATALOGUED = [
  { id: 'uc-pink-smoke', name: 'The Pink Smoke Crewneck', collection: 'uncatalogued', desc: 'Uncatalogued product found in image assets.' },
  { id: 'uc-cotton-candy-tee', name: 'Signature Cotton Candy Tee', collection: 'uncatalogued', desc: 'Uncatalogued product found in image assets.' },
  { id: 'uc-cotton-candy-shorts', name: 'Signature Cotton Candy Shorts', collection: 'uncatalogued', desc: 'Uncatalogued product found in image assets.' },

const ALL_PRODUCTS = [...PRODUCTS, ...UNCATALOGUED];

// ═══════════════════════════════════════════════════════════════
// DATA — Image Mappings
// ═══════════════════════════════════════════════════════════════

const DS = 'datasets/skyyrose_lora_v1/images';
const LH = 'datasets/skyyrose_lora_v1';
const AV = 'skyyrose/assets/images/avatar/poses';
const TD = 'assets/2d-25d-assets';
const GN = 'generated_images';

function img(dir, file, label) {
  return { src: '/' + dir + '/' + encodeURIComponent(file), label };
}
function cdn(url, label) {
  return { src: url, label };
}
function avatar(id) {
  return [
    img(AV, `skyy-idle-${id}.png`, 'Avatar \u2014 Idle'),
    img(AV, `skyy-point-${id}.png`, 'Avatar \u2014 Point'),
    img(AV, `skyy-walk-${id}.png`, 'Avatar \u2014 Walk'),

}

  'br-006': [

const COLLECTION_META = {
  'black-rose': { name: 'BLACK ROSE', accent: '#B76E79' },
  'love-hurts': { name: 'LOVE HURTS', accent: '#8B0000' },
  'signature': { name: 'SIGNATURE', accent: '#D4AF37' },
  'uncatalogued': { name: 'UNCATALOGUED', accent: '#555' },
};

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════

const STORAGE_KEY = 'skyyrose-product-classifications';
let classifications = {};
let imageIndices = {};
let activeCollectionFilter = 'all';
let activeStatusFilter = 'all';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) classifications = JSON.parse(raw);
  } catch (e) { classifications = {}; }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(classifications));
}

function classify(id, status) {
  if (classifications[id] === status) {
    delete classifications[id];
  } else {
    classifications[id] = status;
  }
  saveState();
  updateCard(id);
  updateProgress();
  updateFooter();
}

// ═══════════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════════

function renderGallery() {
  const main = document.getElementById('gallery');
  main.innerHTML = '';

  const collections = ['black-rose', 'love-hurts', 'signature', 'uncatalogued'];
  const filtered = collections.filter(c => activeCollectionFilter === 'all' || c === activeCollectionFilter);

  filtered.forEach(col => {
    const products = ALL_PRODUCTS.filter(p => {
      if (p.collection !== col) return false;
      if (activeStatusFilter === 'unset') return !classifications[p.id];
      if (activeStatusFilter !== 'all') return classifications[p.id] === activeStatusFilter;
      return true;
    });

    if (products.length === 0) return;

    const meta = COLLECTION_META[col];
    const section = document.createElement('div');
    section.className = 'collection-section';
    section.innerHTML = `
      <div class="collection-header">
        <div class="collection-accent" style="background:${meta.accent}"></div>
        <h2 class="collection-name" style="color:${meta.accent}">${meta.name}</h2>
        <span class="collection-count">${products.length} product${products.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="grid">${products.map((p, i) => renderCard(p, i)).join('')}</div>
    `;
    main.appendChild(section);
  });

  // Attach events
  main.querySelectorAll('.card').forEach(card => {
    const id = card.dataset.id;
    card.querySelectorAll('.classify-btn').forEach(btn => {
      btn.addEventListener('click', () => classify(id, btn.dataset.status));
    });
    card.querySelectorAll('.img-arrow').forEach(arrow => {
      arrow.addEventListener('click', (e) => {
        e.stopPropagation();
        const dir = arrow.classList.contains('left') ? -1 : 1;
        changeImage(id, dir);
      });
    });
    card.querySelectorAll('.img-dot').forEach((dot, idx) => {
      dot.addEventListener('click', (e) => {
        e.stopPropagation();
        setImage(id, idx);
      });
    });
  });
}

function renderCard(product, staggerIdx) {
  const images = IMAGES[product.id] || [];
  const idx = imageIndices[product.id] || 0;
  const current = images[idx];
  const cls = classifications[product.id];
  const meta = COLLECTION_META[product.collection];

  let cardClass = 'card';
  if (cls === 'preorder') cardClass += ' classified-preorder';
  if (cls === 'ready') cardClass += ' classified-ready';
  if (cls === 'exclude') cardClass += ' classified-exclude';

  const imgHtml = current
    ? `<img src="${current.src}" alt="${product.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=no-img>Image not found</div>'">`
    : '<div class="no-img">No images available</div>';

  const dots = images.map((_, i) =>
    `<button class="img-dot${i === idx ? ' active' : ''}" data-idx="${i}"></button>`
  ).join('');

  return `
    <div class="${cardClass}" data-id="${product.id}" style="animation-delay:${staggerIdx * 0.06}s">
      <div class="card-img">
        ${imgHtml}
        ${current ? `<div class="img-label">${current.label}</div>` : ''}
        ${images.length > 1 ? `<div class="img-counter">${idx + 1}/${images.length}</div>` : ''}
        ${images.length > 1 ? `<button class="img-arrow left">\u2039</button><button class="img-arrow right">\u203a</button>` : ''}
        ${images.length > 1 ? `<div class="img-nav">${dots}</div>` : ''}
      </div>
      <div class="card-info">
        <div class="card-meta">
          <span class="card-id">${product.id}</span>
          <span class="card-collection" style="background:${meta.accent}22;color:${meta.accent}">${meta.name}</span>
        </div>
        <h3 class="card-name">${product.name}</h3>
        <p class="card-desc">${product.desc}</p>
        <div class="card-actions">
          <button class="classify-btn preorder${cls === 'preorder' ? ' selected' : ''}" data-status="preorder">Pre-Order</button>
          <button class="classify-btn ready${cls === 'ready' ? ' selected' : ''}" data-status="ready">Ready to Sell</button>
          <button class="classify-btn exclude${cls === 'exclude' ? ' selected' : ''}" data-status="exclude">Exclude</button>
        </div>
      </div>
    </div>
  `;
}

function updateCard(id) {
  const card = document.querySelector(`.card[data-id="${id}"]`);
  if (!card) return;

  const cls = classifications[id];
  card.classList.remove('classified-preorder', 'classified-ready', 'classified-exclude');
  if (cls === 'preorder') card.classList.add('classified-preorder');
  if (cls === 'ready') card.classList.add('classified-ready');
  if (cls === 'exclude') card.classList.add('classified-exclude');

  card.querySelectorAll('.classify-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.status === cls);
  });
}

function changeImage(id, dir) {
  const images = IMAGES[id] || [];
  if (images.length <= 1) return;
  const current = imageIndices[id] || 0;
  const next = (current + dir + images.length) % images.length;
  setImage(id, next);
}

function setImage(id, idx) {
  const images = IMAGES[id] || [];
  if (idx < 0 || idx >= images.length) return;
  imageIndices[id] = idx;

  const card = document.querySelector(`.card[data-id="${id}"]`);
  if (!card) return;

  const imgEl = card.querySelector('.card-img img');
  const labelEl = card.querySelector('.img-label');
  const counterEl = card.querySelector('.img-counter');

  if (imgEl) {
    imgEl.src = images[idx].src;
    imgEl.alt = images[idx].label;
  }
  if (labelEl) labelEl.textContent = images[idx].label;
  if (counterEl) counterEl.textContent = `${idx + 1}/${images.length}`;

  card.querySelectorAll('.img-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === idx);
  });
}

function updateProgress() {
  const total = ALL_PRODUCTS.length;
  const done = Object.keys(classifications).length;
  const pct = total > 0 ? (done / total) * 100 : 0;

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${done} / ${total}`;
}

function updateFooter() {
  const counts = { preorder: 0, ready: 0, exclude: 0, unset: 0 };
  ALL_PRODUCTS.forEach(p => {
    const cls = classifications[p.id];
    if (cls) counts[cls]++;
    else counts.unset++;
  });

  document.getElementById('footerStats').innerHTML = `
    <div class="stat"><div class="stat-dot preorder"></div><span class="stat-count">${counts.preorder}</span><span class="stat-label">Pre-Order</span></div>
    <div class="stat"><div class="stat-dot ready"></div><span class="stat-count">${counts.ready}</span><span class="stat-label">Ready to Sell</span></div>
    <div class="stat"><div class="stat-dot exclude"></div><span class="stat-count">${counts.exclude}</span><span class="stat-label">Excluded</span></div>
    <div class="stat"><div class="stat-dot unset"></div><span class="stat-count">${counts.unset}</span><span class="stat-label">Unset</span></div>
  `;
}

// ═══════════════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════════════

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeCollectionFilter = tab.dataset.filter;
    renderGallery();
  });
});

document.querySelectorAll('.filter-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    activeStatusFilter = pill.dataset.status;
    renderGallery();
  });
});

document.getElementById('exportBtn').addEventListener('click', () => {
  const output = { pre_order: [], ready_to_sell: [], exclude: [], unset: [] };
  ALL_PRODUCTS.forEach(p => {
    const cls = classifications[p.id];
    const entry = { id: p.id, name: p.name };
    if (cls === 'preorder') output.pre_order.push(entry);
    else if (cls === 'ready') output.ready_to_sell.push(entry);
    else if (cls === 'exclude') output.exclude.push(entry);
    else output.unset.push(entry);
  });
  document.getElementById('exportOutput').textContent = JSON.stringify(output, null, 2);
  document.getElementById('modalOverlay').classList.add('open');
});

document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('open');
});

document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
});

document.getElementById('modalCopy').addEventListener('click', () => {
  const text = document.getElementById('exportOutput').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('modalCopy');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy to Clipboard'; }, 1800);
  });
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.getElementById('modalOverlay').classList.remove('open');
  }
});

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════

loadState();
renderGallery();
updateProgress();
updateFooter();

</script>
