[mypy]
python_version = 3.11
warn_return_any = False
warn_unused_configs = True
ignore_missing_imports = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = False
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = False
show_error_codes = True
pretty = True
disable_error_code = import-untyped, call-arg, assignment, attr-defined, arg-type, union-attr, index, operator, misc, var-annotated, return-value, no-any-return, override, type-arg, name-defined, has-type, valid-type, no-redef, call-overload, dict-item, list-item, truthy-bool, redundant-cast, comparison-overlap, unreachable, str-bytes-safe, abstract, return, str-format, possibly-undefined, truthy-function
follow_imports = silent
exclude = (?x)(
    hf-spaces/.*
    | legacy/.*
    | \.venv/.*
    | \.venv-.*
    | build/.*
    | dist/.*
    | gemini/clients/.*
    | anthropic/clients/.*
    | openai/clients/.*
    | grok/clients/.*
    | \.claude/.*
    | editorial-staging/.*
    | sdk/.*
    | dev/.*
    | skyyrose/.*
  )

# Relaxed mode for non-production code
[mypy-tests.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False

[mypy-scripts.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False

[mypy-legacy.*]
ignore_errors = True

[mypy-staging.*]
disallow_untyped_defs = False

[mypy-dev.*]
disallow_untyped_defs = False

[mypy-examples.*]
disallow_untyped_defs = False

[mypy-workflows.*]
disallow_untyped_defs = False
