[mypy]
python_version = 3.13
warn_return_any = False
warn_unused_configs = True
ignore_missing_imports = True
# Refuse implicit namespace packages — every package dir MUST have __init__.py.
# This eliminates the "Source file found twice under different module names" class of error.
namespace_packages = False
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = False
show_error_codes = True
pretty = True
disable_error_code = import-untyped, call-arg, assignment, attr-defined, arg-type, union-attr, operator, misc, var-annotated, return-value, no-any-return, override, type-arg, has-type, no-redef, redundant-cast, comparison-overlap, str-bytes-safe, truthy-function, index, dict-item, list-item, return, name-defined, valid-type, call-overload, abstract, type-var
follow_imports = silent
exclude = (?x)(
    hf-spaces/.*
    | legacy/.*
    | \.venv/.*
    | \.venv-.*
    | build/.*
    | dist/.*
    | gemini/clients/.*
    | anthropic/clients/.*
    | openai/clients/.*
    | grok/clients/.*
    | \.claude/.*
    | editorial-staging/.*
    | sdk/.*
    | dev/.*
    | skyyrose/.*
    | _archive/.*
    | open-claude-code/.*
    | \.agents/.*
    | skyyrose-suite/.*  # plugin marketplace — md/json + example scripts only, no importable app Python
    | \.aidesigner/.*
    | TRELLIS\.2/.*
    | claude-context/.*
    | vendor/.*
    | prototypes/.*
    | agents/devskyy-a2a/.*
  )

# Relaxed mode for non-production code
[mypy-tests.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False

[mypy-scripts.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False

[mypy-legacy.*]
ignore_errors = True

[mypy-staging.*]
disallow_untyped_defs = False

[mypy-dev.*]
disallow_untyped_defs = False

[mypy-examples.*]
disallow_untyped_defs = False

[mypy-workflows.*]
disallow_untyped_defs = False
