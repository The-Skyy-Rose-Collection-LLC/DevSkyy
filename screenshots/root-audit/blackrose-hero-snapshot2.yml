        - heading "Born from a Single Question" [level=2] [ref=f108e849]
        - paragraph [ref=f108e850]: "Someone asked who Black Rose was for. The answer came before the question finished: a black rose is a posture. Not a flower — a conviction. In Oakland, where concrete is the only soil that matters, beauty doesn't ask for permission. It forces its way through the cracks."
