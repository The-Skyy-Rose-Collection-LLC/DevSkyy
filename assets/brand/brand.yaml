    path: "wordpress-theme/skyyrose-flagship/assets/images/skyyrose-logo.png"
    alt: "SkyyRose Collection"
  wordmark:
    path: "wordpress-theme/skyyrose-flagship/assets/images/skyyrose-wordmark.png"
  favicon:
    path: "wordpress-theme/skyyrose-flagship/assets/images/favicon.ico"
  mascot:
    path: "wordpress-theme/skyyrose-flagship/assets/images/mascot/skyyrose-mascot-reference.png"
    description: |
      Full-body walk-on character (NOT a chatbot widget). Pixar-quality
      Black girl avatar. Hidden as easter egg in each immersive collection
      world; finding all 3 unlocks the intro.


