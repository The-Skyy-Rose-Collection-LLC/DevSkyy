# SkyyRose Brand — SINGLE SOURCE OF TRUTH
#
# THIS is the primary source for brand identity across WordPress + frontend.
# Any agent, generator, or human editing brand-facing content reads from here.
# Hardcoded brand values elsewhere are LEGACY and should be migrated.
#
# Tools that should read from this file:
#   - WordPress theme (via generated inc/brand.generated.php — see scripts/)
#   - Frontend dashboard (via generated src/config/brand.generated.ts)
#   - Python pipelines (via skyyrose.elite_studio.brand.BrandConfig.load())
#   - Copywriter skills (.claude/skills/skyyrose-*)
#   - SEO / meta tag generators
#   - Email / paid social creative (Klaviyo, Meta)
#
# Editing rules:
#   - Never change `tagline.active` without updating `tagline.retired` to preserve
#     the former. Retired taglines MUST NEVER reappear in generated content.
#   - Hex colors are 6-digit `#RRGGBB`. No 3-digit shorthand.
#   - Adding new collections: create a new entry under `collections:` matching
#     the SKU prefix used in assets/product-masters/catalog.yaml collections.
#   - After editing, run `scripts/sync_brand.py` to regenerate PHP + TS artifacts.

version: 1
generated_at: "2026-04-17T00:00:00Z"


# ── Tagline ──────────────────────────────────────────────────────────────────

tagline:
  # THE tagline. Every surface says this.
  active: "Luxury Grows from Concrete."

  # Historical taglines. Enforcement: a CI test asserts none of these appear
  # in any wordpress/**/*.{php,py} or frontend/**/*.{ts,tsx,js,jsx} file.
  retired:
    - phrase: "Where Love Meets Luxury"
      retired_at: "2026-03"
      reason: |
        Original marketing tagline. Replaced with "Luxury Grows from Concrete."
        to align with the brand's Oakland/concrete-luxury positioning. Must
        never reappear in generated content.


# ── Brand identity ──────────────────────────────────────────────────────────

identity:
  name: "SkyyRose"
  legal_name: "The Skyy Rose Collection LLC"
  founder: "Corey Foster"
  origin: "Oakland, CA"
  mission: |
    Luxury streetwear born from concrete. SkyyRose brings Oakland's grit
    into premium fashion — gothic romance, passionate emotion, and Bay Area
    essentials woven into every piece.


# ── Color palette ───────────────────────────────────────────────────────────
# Per-collection palettes. Each SKU in catalog.yaml can inherit or override.

colors:
  primary:
    dark: "#0A0A0A"              # Base background across all surfaces
    rose_gold: "#B76E79"         # Global accent + Kids Capsule accent
    gold: "#D4AF37"              # Signature collection accent
    crimson: "#DC143C"           # Love Hurts accent
    silver: "#C0C0C0"            # Black Rose accent

  neutrals:
    paper: "#F5F5F5"
    ink: "#1A1A1A"
    ash: "#8A8A8A"

  semantic:
    success: "#10B981"
    warning: "#F59E0B"
    error: "#EF4444"
    info: "#3B82F6"


