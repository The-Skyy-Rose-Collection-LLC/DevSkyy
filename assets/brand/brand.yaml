  twitter: "@skyyroseco"
  tiktok: "@skyyroseco"
  youtube: "@skyyroseco"
  email: "skyyroseco@gmail.com"


# ── Domain / URL routing ────────────────────────────────────────────────────

urls:
  flagship: "https://skyyrose.co"               # customer-facing WordPress store
  dashboard: "https://devskyy.app"              # internal Vercel agent dashboard
  # CRITICAL: do not mix these up. flagship = customer. dashboard = internal.


# ── Migration / enforcement ─────────────────────────────────────────────────

migration:
  # Files known to hardcode values that should come from this file.
  # CI/tests should assert these get migrated.
  pending_retired_tagline_removals:
    - wordpress/page_builders/luxury_home_builder.py
    - wordpress/page_builders/home_builder.py
    - wordpress/page_builders/about_builder.py
    - wordpress/elementor.py
    - wordpress/production_config.py
    - wordpress/collection_page_manager.py  # uses "Luxury Grows..." — keep, just migrate the source
    - skyyrose/multi_agent/tools.py          # uses "Luxury Grows..." — keep, just migrate the source

  pending_hardcoded_collection_metadata:
    - wordpress/collection_page_manager.py  # full collection dicts — migrate to inherit from brand.yaml + catalog.yaml

  enforcement_tests:
    - path: skyyrose/elite_studio/tests/test_brand_enforcement.py
      asserts:
        - No retired-tagline phrase appears in wordpress/**/*.{py,php}
        - No retired-tagline phrase appears in frontend/**/*.{ts,tsx,js,jsx}
        - Every collection slug in catalog.yaml has a matching entry in brand.yaml.collections
