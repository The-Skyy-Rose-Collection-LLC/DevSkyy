#
# THIS is the primary source that all calls aim toward.
# Tools that should read from this file:
#   - Vision test (scripts/vision_test_registry.py)
#   - Fidelity gate (skyyrose/elite_studio/fidelity.py)
#   - Compositor (skyyrose/elite_studio/agents/compositor_agent.py)
#   - Prompt generator (all Gemini / FLUX prompt assembly)
#   - Copywriter skill (skyyrose-product-copy)
#   - Manifest.json is DERIVED — never edit manifest.json directly.
#
# Editing rules:
#   - Never delete a SKU. Use status: retired instead.
#   - SKU renames: current SKU at top-level; legacy codes in aliases: [].
#   - Multi-colorway / multi-config: use variants: [] with variant_id + name.
#   - branding_summary is read by prompt generators — keep it precise.
#   - review_flags: [] holds open questions the next editor must resolve.
#
# Regenerate with: python scripts/generate_catalog.py
# Generated: 2026-04-17T13:56:39Z

