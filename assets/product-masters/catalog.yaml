# ── Catalog rules (cross-cutting) ──
# These apply across SKUs and supplement per-product branding_summary.
catalog_rules:
  jerseys:
    universal_patch_rule: |
      Every SkyyRose jersey has a league-specific custom patch applied to the BOTTOM-LEFT CORNER of the jersey front. The patch sport matches the jersey silhouette (baseball / football / basketball / hockey).
    patch_assets:
      baseball: skyyrose/assets/images/source-products/brand-assets/patch-mlb-baseball.jpeg
      football: skyyrose/assets/images/source-products/brand-assets/patch-nfl-football.jpeg
      basketball: skyyrose/assets/images/source-products/brand-assets/patch-nba-basketball.jpeg
      hockey: skyyrose/assets/images/source-products/brand-assets/patch-hockey-championship.jpeg
    sku_to_patch:
      br-003: baseball
      br-008: football
      br-009: football
      br-010: basketball
      br-011: hockey

# ── Series (brand-named sub-collections) ──
# Series group SKUs that ship as a unified drop. Used by email flows,
# paid-media audiences, product-page filters, and prompt generators.
# lookbook_images hold series-level assets (not owned by any single SKU).
series:
  The Jersey Series:
    collection: black-rose
    description: |
      THE JERSEY SERIES — SkyyRose's flagship sportswear line. Every SkyyRose jersey ships under this banner with a league-specific custom patch stitched to the bottom-left corner of the front. Long-term brand selling point: 'Under the Jersey Series' becomes instantly identifiable to the customer.
      
      Current roster:
        br-003  BLACK is Beautiful Jersey  (baseball patch — 4 variants)
        br-008  SF Inspired Jersey          (football patch, limited 80)
        br-009  LAST OAKLAND Jersey         (football patch, limited 80)
        br-010  THE BAY Jersey              (basketball patch, limited 80)
        br-011  SHARKS EDITION Jersey       (hockey patch, limited 80)
      
      New jersey SKUs MUST be added to this series. No 'standalone jersey' concept.
    skus: [br-003, br-008, br-009, br-010, br-011]
    lookbook_images: []
  Bridge Series:
    collection: signature
    description: |
      Bay Area bridge-themed drop. Sublimated bridge imagery on shorts, embroidered rose medallions on matching shirts. Blue rose = Bay Bridge, purple rose = Golden Gate.
    skus: [sg-001, sg-002, sg-003, sg-005]
    lookbook_images: []
  "Mint & Lavender":
    collection: signature
    description: |
      Mint-and-lavender colorway capsule. Hoodie + crewneck + sweatpants tri-piece that work as separates or as a full sweatsuit. Lavender rose embroidery.
    skus: [sg-006, sg-013, sg-014]
    lookbook_images:        # 1 series-level asset(s)
      - skyyrose/assets/images/source-products/signature/sg-d03-mint-sweatsuit-set.jpeg
  Original Label:
    collection: signature
    description: |
      Minimal-label tee program. Two colorways (white, orchid). Original SkyyRose label/tag styling — the brand's foundational tee.
    skus: [sg-011, sg-012]
    lookbook_images: []

