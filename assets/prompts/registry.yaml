# SkyyRose Prompt Library — SINGLE SOURCE OF TRUTH for prompts with production impact
#
# Every prompt that has shipped (or been formally considered for shipment) lives here
# with versioning, model, dates, and quantified impact.
#
# Tools that read this file:
#   - Prompt generators (Gemini/FLUX scene + QA assembly)
#   - Compositor agent (Stage 6 visual QA)
#   - Vision test (product identification)
#   - Copywriter skills (product descriptions, email, paid social)
#
# Editing rules:
#   - Never delete a prompt. Set status: retired + fill production_until.
#   - ID format: 'component.name.vN' (lowercase snake_case, trailing .v<int>)
#   - Components MUST be declared in the components: block before a prompt can
#     reference them (validated at load time).
#   - Template placeholders ({var}) MUST match the variables: [] list exactly.
#     Use {{ }} for literal braces (e.g., JSON output formats).
#   - Keep `impact` fields accurate — they're the whole point of this registry.
#     'TBD' is OK as a string placeholder; fabricated numbers are not.
#
# Validation runs on every PromptLibrary.load() — structural errors raise,
# referential errors surface in .violations (strict=True raises IntegrityError).
#
# Regenerate/edit by hand. No generator script (yet) — prompts are too varied
# to auto-extract reliably. Add new prompts as you ship them.

