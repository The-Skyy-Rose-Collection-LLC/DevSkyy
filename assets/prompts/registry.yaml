      Analyze this composited fashion image for quality.

      SCENE: {scene_name} (collection: {collection})

      Rate each criterion 1-10 and return JSON:
      {{
        "status": "pass|warn|fail",
        "lighting_match": {{"score": N, "notes": "..."}},
        "garment_fidelity": {{"score": N, "notes": "..."}},
        "scene_coherence": {{"score": N, "notes": "..."}}
      }}

      pass = all scores >= 7, warn = any score 5-6, fail = any score < 5.
      Return ONLY valid JSON.
    impact:
      drops: []
