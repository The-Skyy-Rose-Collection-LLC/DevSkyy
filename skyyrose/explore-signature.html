<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>THE RUNWAY — SkyyRose</title>
<meta name="description" content="Explore the Signature Collection by The Skyy Rose Collection. Where love meets luxury.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#080808;font-family:'Cormorant Garamond',serif}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}

#loader{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a0a;transition:opacity .5s ease}
#loader.done{opacity:0;pointer-events:none}
#loader-text{font-size:10px;letter-spacing:.45em;text-transform:uppercase;color:#D4AF37;opacity:.6;margin-bottom:24px}
#loader-bar{width:192px;height:1px;background:rgba(255,255,255,.1);position:relative;overflow:hidden}
#loader-fill{position:absolute;inset:0;left:0;width:0;background:#D4AF37;transition:width .3s}
#loader-pct{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.2em;margin-top:12px}

.scene-wrap{position:fixed;inset:0;z-index:0;opacity:0;transform:scale(1.04);transition:opacity .8s ease,transform .8s ease}
.scene-wrap.ready{opacity:1;transform:scale(1)}
.scene-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;will-change:transform,opacity;user-select:none;-webkit-user-drag:none}
#sceneA{opacity:1;transition:opacity 2.5s ease-in-out}
#sceneB{opacity:0;transition:opacity 2.5s ease-in-out}
.scene-wrap.alt #sceneA{opacity:0}
.scene-wrap.alt #sceneB{opacity:1}

.hotspot{position:absolute;transform:translate(-50%,-50%);z-index:20;background:none;border:none;cursor:pointer;padding:0;-webkit-tap-highlight-color:transparent}
.hotspot-dot{display:block;width:14px;height:14px;border-radius:50%;background:rgba(0,0,0,.75);box-shadow:0 0 12px rgba(0,0,0,.25);transition:transform .25s ease}
.hotspot:hover .hotspot-dot,.hotspot:active .hotspot-dot{transform:scale(1.3)}
.hotspot-ring{position:absolute;width:40px;height:40px;left:-13px;top:-13px;border-radius:50%;border:1px solid rgba(0,0,0,.12);animation:pulse 2.8s ease-in-out infinite}
.hotspot-label{position:absolute;bottom:calc(100% + 12px);left:50%;transform:translateX(-50%);white-space:nowrap;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#111;text-shadow:0 1px 4px rgba(255,255,255,.8);padding:4px 10px;background:rgba(255,255,255,.45);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border-radius:3px;pointer-events:none;opacity:0.5;transition:opacity .2s ease}
.hotspot-coord{position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);font-size:8px;letter-spacing:.2em;color:rgba(255,255,255,.25);white-space:nowrap;pointer-events:none}

.hotspot:hover .hotspot-label,.hotspot:active .hotspot-label{opacity:1}
@media(max-width:768px){.hotspot{min-width:44px;min-height:44px}}

@keyframes pulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.8);opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes dotIn{from{opacity:0;transform:translate(-50%,-50%) scale(0)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes float{0%{transform:translateY(0) translateX(0)}25%{transform:translateY(-30vh) translateX(10px)}50%{transform:translateY(-60vh) translateX(-8px)}75%{transform:translateY(-90vh) translateX(12px)}100%{transform:translateY(-120vh) translateX(0)}}

#header{position:fixed;top:0;left:0;right:0;z-index:40;display:flex;align-items:center;justify-content:space-between;padding:20px 28px;opacity:0;animation:fadeUp .6s ease .4s both}
.col-num{font-size:9px;letter-spacing:.4em;text-transform:uppercase;color:rgba(0,0,0,.4);text-shadow:0 1px 4px rgba(255,255,255,.5)}
.room-title{font-size:18px;letter-spacing:.15em;text-transform:uppercase;font-weight:400;color:#111;text-shadow:0 1px 8px rgba(255,255,255,.6)}
.brand-mark{font-size:8px;letter-spacing:.5em;text-transform:uppercase;text-align:right;color:rgba(0,0,0,.4);text-shadow:0 1px 4px rgba(255,255,255,.5)}
.brand-tagline{font-size:9px;letter-spacing:.2em;font-style:italic;text-align:right;color:#D4AF37;text-shadow:0 1px 8px rgba(212,175,55,.3)}

#hint{position:fixed;left:28px;bottom:72px;z-index:30;display:flex;align-items:center;gap:8px;opacity:0;animation:fadeUp .6s ease 1.2s both}
#hint span{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:rgba(0,0,0,.35);text-shadow:0 1px 3px rgba(255,255,255,.4)}
#hint-dot{width:4px;height:4px;border-radius:50%;background:#D4AF37;box-shadow:0 0 6px rgba(212,175,55,.4);animation:pulse 2s ease infinite}

#room-nav{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;justify-content:center;padding:0 0 20px;opacity:0;animation:fadeUp .5s ease .8s both}
@supports(padding:env(safe-area-inset-bottom)){#room-nav{padding-bottom:calc(20px + env(safe-area-inset-bottom))}}
.nav-glass{display:flex;align-items:center;gap:4px;background:rgba(0,0,0,.25);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.06);border-radius:6px;padding:6px 8px}
.nav-btn{padding:10px 16px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-family:'Cormorant Garamond',serif;color:rgba(255,255,255,.4);background:transparent;border:1px solid transparent;border-radius:4px;cursor:pointer;white-space:nowrap;min-height:44px;transition:all .3s;text-decoration:none;display:inline-flex;align-items:center}
.nav-btn.active{font-weight:600}

#dots{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:50;display:flex;align-items:flex-end;gap:12px;opacity:0;animation:fadeUp .5s ease 1s both}
.dot{border-radius:50%;transition:all .3s}
.dot-label{font-size:7px;letter-spacing:.2em;text-transform:uppercase;margin-top:4px;text-align:center}

.swipe-arrow{position:fixed;top:50%;transform:translateY(-50%);z-index:30;display:flex;flex-direction:column;align-items:center;gap:4px;opacity:0;animation:fadeUp .6s ease 1.4s both}
.swipe-arrow-left{left:0;padding:20px 8px 20px 6px}
.swipe-arrow-right{right:0;padding:20px 6px 20px 8px}
.arrow-char{font-size:18px;color:rgba(0,0,0,.2);text-shadow:0 1px 3px rgba(255,255,255,.4)}
.arrow-name{font-size:7px;letter-spacing:.15em;text-transform:uppercase;color:rgba(0,0,0,.15);text-shadow:0 1px 3px rgba(255,255,255,.4);writing-mode:vertical-lr}

#modal-backdrop{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.45);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);opacity:0;transition:opacity .25s ease;pointer-events:none}
#modal-backdrop.open{opacity:1;pointer-events:auto}
#modal{position:fixed;bottom:0;left:0;right:0;z-index:100;max-height:90vh;overflow-y:auto;background:rgba(12,12,12,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.06);border-radius:12px 12px 0 0;transform:translateY(100%);opacity:0;transition:transform .3s ease,opacity .3s ease}
#modal.open{transform:translateY(0);opacity:1}
.modal-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.15);margin:0 auto 16px}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:rgba(255,255,255,.4);font-size:18px;cursor:pointer;padding:8px}
.modal-close:hover{color:rgba(255,255,255,.8)}
.modal-tag{font-size:9px;letter-spacing:.4em;text-transform:uppercase;color:#D4AF37;margin-bottom:4px}
.modal-name{font-size:20px;color:#fff;font-weight:500;letter-spacing:.04em;margin-bottom:4px}
.modal-price{font-size:14px;color:#D4AF37;letter-spacing:.08em;margin-bottom:16px}
.modal-divider{width:100%;height:1px;background:rgba(255,255,255,.08);margin-bottom:16px}
.modal-desc{font-size:13px;color:rgba(255,255,255,.7);line-height:1.6;margin-bottom:16px}
.modal-detail{font-size:11px;font-style:italic;color:rgba(212,175,55,.6);margin-bottom:20px}
.sizes-label{font-size:9px;letter-spacing:.35em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:8px}
.sizes-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.size-btn{padding:6px 14px;font-size:11px;letter-spacing:.06em;font-family:'Cormorant Garamond',serif;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);background:transparent;border-radius:3px;cursor:pointer;transition:all .2s}
.size-btn.selected{border-color:#D4AF37;color:#D4AF37;background:rgba(212,175,55,.08)}
.cart-btn{width:100%;padding:12px;font-size:11px;letter-spacing:.25em;text-transform:uppercase;font-family:'Cormorant Garamond',serif;font-weight:600;border:none;border-radius:3px;cursor:pointer;transition:all .3s}
.cart-btn.ready{background:#D4AF37;color:#000}
.cart-btn.waiting{background:rgba(255,255,255,.06);color:rgba(255,255,255,.25);cursor:not-allowed}
.particle{position:fixed;border-radius:50%;pointer-events:none;z-index:5;background:#000}

@media(max-width:640px){
  #modal{max-height:80vh}
  .room-title{font-size:15px;letter-spacing:.1em}
  .brand-mark,.brand-tagline{display:none}
}
</style>
</head>
<body>

<div id="loader">
  <div id="loader-text">Entering The Runway</div>
  <div id="loader-bar"><div id="loader-fill"></div></div>
  <div id="loader-pct">0%</div>
</div>

<div class="scene-wrap" id="scene">
  <img id="sceneA" class="scene-img" alt="WATERFRONT RUNWAY — View A" draggable="false">
  <img id="sceneB" class="scene-img" alt="GOLDEN GATE SHOWROOM — View B" draggable="false">
</div>

<div id="hotspots"></div>

<div id="header" style="display:none">
  <div>
    <div class="col-num">Collection Three</div>
    <h1 class="room-title">THE RUNWAY</h1>
  </div>
  <div>
    <div class="brand-mark">SKYYROSE</div>
    <div class="brand-tagline">Where Love Meets Luxury</div>
  </div>
</div>

<div id="hint" style="display:none">

</div>

<div id="room-nav" style="display:none">
  <div class="nav-glass" id="nav-buttons"></div>
</div>

<div id="dots" style="display:none"></div>
<div id="swipe-arrows" style="display:none"></div>

<div id="modal-backdrop" onclick="closeModal()"></div>
<div id="modal">
  <div style="padding:10px 0 6px;text-align:center"><div class="modal-handle" style="margin:0 auto"></div></div>
  <div id="m-img-wrap" style="display:none;width:100%;height:380px;overflow:hidden;background:#0d0d0d;position:relative">
    <img id="m-img" src="" alt="" style="width:100%;height:100%;object-fit:contain;object-position:center">
    <img id="m-img2" src="" alt="" style="width:100%;height:100%;object-fit:cover;object-position:top center;display:none;position:absolute;inset:0">
    <button id="m-view-btn" onclick="toggleView()" style="position:absolute;bottom:12px;right:12px;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);font-size:8px;letter-spacing:.25em;text-transform:uppercase;padding:6px 10px;border-radius:3px;cursor:pointer;font-family:inherit;display:none">MODEL VIEW</button>
    <button class="modal-close" onclick="closeModal()" style="position:absolute;top:12px;right:12px;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6);font-size:16px;width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1">&times;</button>

    </div>
    <div class="modal-name" id="m-name"></div>
    <div class="modal-price" id="m-price"></div>
    <div class="modal-divider"></div>
    <div class="modal-desc" id="m-desc"></div>
    <div class="modal-detail" id="m-detail"></div>
    <div id="m-colors" style="display:none"></div>

    <div class="sizes-wrap" id="m-sizes"></div>
    <button class="cart-btn waiting" id="m-cart" onclick="addToCart()">Select a Size</button>
  </div>
</div>

<script>
(function(){
var ACCENT="#D4AF37",ACCENT_RGB="212,175,55";
var PRODUCTS=[{"id": "sg-009", "name": "Red Rose Beanie", "collection": "SIGNATURE", "badge": "AVAILABLE", "price": "$45", "desc": "A plush knit beanie crowned with a crimson rose emblem \u2014 West Coast warmth, luxury defined.", "detail": "Fine Knit Yarn \u2022 Embroidered Red Rose \u2022 One Size", "sizes": ["One Size"], "colors": [{"name": "Red", "hex": "#C0392B"}], "image": "assets/images/products/sg-009/sg-009-product.jpg", "image2": "assets/images/products/sg-009/sg-009-model.jpg", "x": 15, "y": 42}, {"id": "sg-010", "name": "Lavender Rose Beanie", "collection": "SIGNATURE", "badge": "AVAILABLE", "price": "$45", "desc": "Soft lavender knit meets delicate rose detailing \u2014 effortless luxury for every season.", "detail": "Fine Knit Yarn \u2022 Embroidered Lavender Rose \u2022 One Size", "sizes": ["One Size"], "colors": [{"name": "Lavender", "hex": "#B39DDB"}], "image": "assets/images/products/sg-010/sg-010-product.jpg", "image2": "assets/images/products/sg-010/sg-010-model.jpg", "x": 20, "y": 48}, {"id": "sg-006", "name": "Cotton Candy Tee", "collection": "SIGNATURE", "badge": "AVAILABLE", "price": "$65", "desc": "Pastel perfection in premium cotton \u2014 a sweet statement of West Coast luxury.", "detail": "Premium Cotton \u2022 Relaxed Fit \u2022 Cotton Candy Colorway", "sizes": ["XS", "S", "M", "L", "XL", "2XL"], "colors": [{"name": "Cotton Candy", "hex": "#FFB6C1"}], "image": "assets/images/products/sg-006/sg-006-product.jpg", "image2": "assets/images/products/sg-006/sg-006-model.jpg", "x": 28, "y": 55}, {"id": "sg-007", "name": "Cotton Candy Shorts", "collection": "SIGNATURE", "badge": "AVAILABLE", "price": "$55", "desc": "Breezy pastel shorts crafted for comfort and couture \u2014 the perfect complement to the Cotton Candy Tee.", "detail": "Premium Cotton \u2022 Elastic Waist \u2022 Cotton Candy Colorway", "sizes": ["XS", "S", "M", "L", "XL", "2XL"], "colors": [{"name": "Cotton Candy", "hex": "#FFB6C1"}], "image": "assets/images/products/sg-007/sg-007-product.jpg", "image2": "assets/images/products/sg-007/sg-007-model.jpg", "x": 32, "y": 62}, {"id": "sg-002", "name": "Stay Golden Tee", "collection": "SIGNATURE", "badge": "AVAILABLE", "price": "$65", "desc": "West Coast ambition meets luxury. An opulent rose design in gold \u2014 for those who stay golden.", "detail": "Premium Cotton \u2022 Gold Rose Print \u2022 Relaxed Fit", "sizes": ["XS", "S", "M", "L", "XL", "2XL", "3XL"], "colors": [{"name": "Gold", "hex": "#D4AF37"}], "image": "assets/images/products/sg-002/sg-002-product.jpg", "image2": "assets/images/products/sg-002/sg-002-model.jpg", "x": 42, "y": 35}, {"id": "sg-004", "name": "Signature Hoodie", "collection": "SIGNATURE", "badge": "AVAILABLE", "price": "$145", "desc": "The definitive SkyyRose hoodie \u2014 premium weight, signature embroidery, unmistakable luxury.", "detail": "Premium Heavyweight \u2022 Kangaroo Pocket \u2022 Signature Embroidery", "sizes": ["S", "M", "L", "XL", "2XL", "3XL"], "colors": [{"name": "Black", "hex": "#1A1A1A"}], "image": "assets/images/products/sg-004/sg-004-product.jpg", "image2": "assets/images/products/sg-004/sg-004-model.jpg", "x": 50, "y": 38}, {"id": "sg-008", "name": "Crop Hoodie", "collection": "SIGNATURE", "badge": "AVAILABLE", "price": "$125", "desc": "Cropped silhouette meets premium construction \u2014 elevated street luxury for the bold.", "detail": "Premium Cotton Blend \u2022 Cropped Cut \u2022 Ribbed Hem", "sizes": ["XS", "S", "M", "L", "XL"], "colors": [{"name": "Black", "hex": "#1A1A1A"}], "image": "assets/images/products/sg-008/sg-008-product.jpg", "image2": "assets/images/products/sg-008/sg-008-model.jpg", "x": 62, "y": 36}, {"id": "sg-005", "name": "Signature Shorts", "collection": "SIGNATURE", "badge": "AVAILABLE", "price": "$55", "desc": "Relaxed-fit shorts with signature rose detailing \u2014 West Coast comfort elevated to couture.", "detail": "Premium Cotton \u2022 Drawstring Waist \u2022 Rose Embroidery", "sizes": ["S", "M", "L", "XL", "2XL", "3XL"], "colors": [{"name": "Black", "hex": "#1A1A1A"}], "image": "assets/images/products/sg-005/sg-005-product.jpg", "image2": "assets/images/products/sg-005/sg-005-model.jpg", "x": 70, "y": 55}, {"id": "sg-001", "name": "The Bay Set", "collection": "SIGNATURE", "badge": "PRE-ORDER", "price": "$225", "desc": "Embody West Coast luxury. The iconic blue rose and vibrant Bay Area skyline \u2014 prestige elevated.", "detail": "Premium Fabric \u2022 Tee + Shorts Set \u2022 Bay Bridge Design", "sizes": ["S", "M", "L", "XL", "2XL", "3XL"], "colors": [{"name": "White/Blue", "hex": "#F5F5F5"}], "image": "assets/images/products/sg-001/sg-001-product.jpg", "image2": "assets/images/products/sg-001/sg-001-model.jpg", "x": 75, "y": 60}, {"id": "sg-011", "name": "Original Label Tee White", "collection": "SIGNATURE", "badge": "AVAILABLE", "price": "$55", "desc": "Clean, classic, unmistakably SkyyRose \u2014 the original label tee in crisp white.", "detail": "Premium Cotton \u2022 Original Label Print \u2022 White Colorway", "sizes": ["XS", "S", "M", "L", "XL", "2XL"], "colors": [{"name": "White", "hex": "#FFFFFF"}], "image": "assets/images/products/sg-011/sg-011-product.jpg", "image2": "assets/images/products/sg-011/sg-011-model.jpg", "x": 38, "y": 72}, {"id": "sg-012", "name": "Original Label Tee Orchid", "collection": "SIGNATURE", "badge": "AVAILABLE", "price": "$55", "desc": "The original label tee reimagined in rich orchid \u2014 a bold statement of refined luxury.", "detail": "Premium Cotton \u2022 Original Label Print \u2022 Orchid Colorway", "sizes": ["XS", "S", "M", "L", "XL", "2XL"], "colors": [{"name": "Orchid", "hex": "#9B59B6"}], "image": "assets/images/products/sg-012/sg-012-product.jpg", "image2": "assets/images/products/sg-012/sg-012-model.jpg", "x": 58, "y": 72}, {"id": "sg-003", "name": "Pink Smoke Crewneck", "collection": "SIGNATURE", "badge": "AVAILABLE", "price": "$95", "desc": "Ethereal pink smoke graphics on a premium crewneck \u2014 where street meets haute couture.", "detail": "Premium Cotton Blend \u2022 Ribbed Collar \u2022 Pink Smoke Graphic", "sizes": ["S", "M", "L", "XL", "2XL"], "colors": [{"name": "Pink Smoke", "hex": "#E8B4B8"}], "image": "assets/images/products/sg-003/sg-003-product.jpg", "image2": "assets/images/products/sg-003/sg-003-model.jpg", "x": 22, "y": 40}];
var NAV=[{"label": "The Garden", "href": "explore-black-rose.html", "icon": "\u25c6", "accent": "#B76E79", "accentRgb": "183,110,121", "active": false}, {"label": "The Ballroom", "href": "explore-love-hurts.html", "icon": "\u2665", "accent": "#DC143C", "accentRgb": "220,20,60", "active": false}, {"label": "The Runway", "href": "explore-signature.html", "icon": "\u25c6", "accent": "#D4AF37", "accentRgb": "212,175,55", "active": true}];
var SCENE_A="../assets/scenes/signature/signature-waterfront-runway.png";
var SCENE_B="../assets/scenes/signature/signature-golden-gate-showroom.png";

var selectedSize=null,currentProduct=null,sceneAlt=false;
var progress=0,loaded=0,loaderDone=false;

function updateLoader(p){progress=Math.min(p,100);document.getElementById("loader-fill").style.width=progress+"%";document.getElementById("loader-pct").textContent=Math.round(progress)+"%"}
function onImageLoaded(){loaded++;if(loaded>=2&&!loaderDone){loaderDone=true;updateLoader(100);setTimeout(revealScene,600)}}

var imgA=document.getElementById("sceneA"),imgB=document.getElementById("sceneB");
imgA.onload=onImageLoaded;imgA.onerror=onImageLoaded;
imgB.onload=onImageLoaded;imgB.onerror=onImageLoaded;
imgA.src=SCENE_A;imgB.src=SCENE_B;

var fakeIv=setInterval(function(){if(loaderDone){clearInterval(fakeIv);return}updateLoader(progress+Math.random()*14+3);if(progress>90)progress=90},120);

function revealScene(){
  document.getElementById("loader").classList.add("done");
  document.getElementById("scene").classList.add("ready");
  ["header","hint","room-nav","dots","swipe-arrows"].forEach(function(id){
    var el=document.getElementById(id);if(el)el.style.display=id==="swipe-arrows"?"block":"flex";
  });
  createHotspots();createParticles();startCrossfade();
}

function startCrossfade(){setInterval(function(){sceneAlt=!sceneAlt;var s=document.getElementById("scene");if(sceneAlt)s.classList.add("alt");else s.classList.remove("alt")},8000)}

document.addEventListener("mousemove",function(e){
  var px=(e.clientX/window.innerWidth-.5)*-12,py=(e.clientY/window.innerHeight-.5)*-8;
  var t="translate("+px+"px,"+py+"px) scale(1.06)";
  imgA.style.transform=t;imgB.style.transform=t;
});

function createHotspots(){
  var c=document.getElementById("hotspots");
  PRODUCTS.forEach(function(p,i){
    var b=document.createElement("button");b.className="hotspot";
    b.style.left=p.x+"%";b.style.top=p.y+"%";
    b.style.animation="dotIn .6s ease "+(i*.12+.8)+"s both";
    b.innerHTML='<span class="hotspot-ring" style="animation-delay:'+(i*.3)+'s"></span><span class="hotspot-dot"></span><span class="hotspot-label">'+p.name+" — "+p.price+"</span>"+'<span class="hotspot-coord">'+p.x+'°  '+p.y+'°</span>';
    b.addEventListener("click",function(){openModal(p)});c.appendChild(b);
  });
}

function createParticles(){for(var i=0;i<16;i++){var d=document.createElement("div");d.className="particle";d.style.left=Math.random()*100+"%";d.style.top=Math.random()*100+"%";var s=Math.random()*2+1;d.style.width=s+"px";d.style.height=s+"px";d.style.opacity=Math.random()*.03+.01;d.style.animation="float "+(Math.random()*25+20)+"s linear "+(Math.random()*-30)+"s infinite";document.body.appendChild(d)}}

var showingModel=false;window.toggleView=function(){showingModel=!showingModel;var img1=document.getElementById("m-img"),img2=document.getElementById("m-img2"),btn=document.getElementById("m-view-btn");if(showingModel){img1.style.display="none";img2.style.display="block";if(btn)btn.textContent="PRODUCT VIEW";}else{img1.style.display="block";img2.style.display="none";if(btn)btn.textContent="MODEL VIEW";}};window.openModal=function(p){currentProduct=p;selectedSize=null;showingModel=false;document.getElementById("m-tag").textContent=p.collection||"";document.getElementById("m-name").textContent=p.name;document.getElementById("m-price").textContent=p.price;document.getElementById("m-desc").textContent=p.desc;document.getElementById("m-detail").textContent=p.detail;var badge=document.getElementById("m-badge");if(badge){if(p.badge){badge.textContent=p.badge;badge.style.display="inline-block";}else{badge.style.display="none";}}var imgWrap=document.getElementById("m-img-wrap");var img1=document.getElementById("m-img"),img2=document.getElementById("m-img2"),btn=document.getElementById("m-view-btn");if(imgWrap&&p.image){img1.src=p.image;img1.alt=p.name;img1.style.display="block";if(p.image2&&img2){img2.src=p.image2;img2.alt=p.name;img2.style.display="none";if(btn)btn.style.display="block";}else{if(img2)img2.style.display="none";if(btn)btn.style.display="none";}imgWrap.style.display="block";}else if(imgWrap){imgWrap.style.display="none";}var sz=document.getElementById("m-sizes");sz.innerHTML="";p.sizes.forEach(function(s){var btn2=document.createElement("button");btn2.className="size-btn";btn2.textContent=s;btn2.addEventListener("click",function(){selectedSize=s;sz.querySelectorAll(".size-btn").forEach(function(b){b.classList.remove("selected")});btn2.classList.add("selected");var c=document.getElementById("m-cart");c.textContent="Add to Cart";c.className="cart-btn ready"});sz.appendChild(btn2);});var colEl=document.getElementById("m-colors");if(colEl){colEl.innerHTML="";if(p.colors&&p.colors.length>1){colEl.style.display="block";var cl=document.createElement("div");cl.style.cssText="font-size:9px;letter-spacing:.35em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:8px";cl.textContent="COLOR";colEl.appendChild(cl);var cw=document.createElement("div");cw.style.cssText="display:flex;gap:8px;margin-bottom:16px";p.colors.forEach(function(col){var sw=document.createElement("div");sw.style.cssText="width:18px;height:18px;border-radius:50%;border:1px solid rgba(255,255,255,.2);cursor:pointer;transition:transform .2s;background:"+col.hex;sw.title=col.name;sw.onmouseenter=function(){this.style.transform="scale(1.2)"};sw.onmouseleave=function(){this.style.transform="scale(1)"};cw.appendChild(sw);});colEl.appendChild(cw);}else{colEl.style.display="none";}}document.getElementById("m-cart").textContent="Select a Size";document.getElementById("m-cart").className="cart-btn waiting";document.getElementById("modal-backdrop").classList.add("open");requestAnimationFrame(function(){document.getElementById("modal").classList.add("open")});};

window.closeModal=function(){document.getElementById("modal").classList.remove("open");document.getElementById("modal-backdrop").classList.remove("open");currentProduct=null;selectedSize=null};
window.addToCart=function(){if(!selectedSize||!currentProduct)return;console.log("Add to cart:",currentProduct.name,"Size:",selectedSize);alert(currentProduct.name+" ("+selectedSize+") — Added to cart!");closeModal()};

var navC=document.getElementById("nav-buttons");
NAV.forEach(function(n){
  var a=document.createElement("a");a.className="nav-btn"+(n.active?" active":"");a.href=n.href;
  a.style.color=n.active?n.accent:"rgba(255,255,255,.4)";
  if(n.active){a.style.background="rgba("+n.accentRgb+",.1)";a.style.borderColor="rgba("+n.accentRgb+",.2)"}
  a.innerHTML='<span style="margin-right:6px">'+n.icon+"</span>"+n.label;navC.appendChild(a);
});

var dotsEl=document.getElementById("dots");
NAV.forEach(function(n){
  var w=document.createElement("div");w.style.cssText="display:flex;flex-direction:column;align-items:center;gap:4px";
  var d=document.createElement("div");d.className="dot";
  d.style.width=n.active?"8px":"5px";d.style.height=n.active?"8px":"5px";
  d.style.background=n.active?n.accent:"rgba(255,255,255,.2)";
  if(n.active)d.style.boxShadow="0 0 8px rgba("+n.accentRgb+",.4)";
  w.appendChild(d);
  if(n.active){var l=document.createElement("div");l.className="dot-label";l.style.color=n.accent;l.style.textShadow="0 1px 6px rgba("+n.accentRgb+",.3)";l.textContent=n.label;w.appendChild(l)}
  dotsEl.appendChild(w);
});

var arrowsEl=document.getElementById("swipe-arrows");
var ci=NAV.findIndex(function(n){return n.active});
if(ci>0){var prev=NAV[ci-1];arrowsEl.innerHTML+='<div class="swipe-arrow swipe-arrow-left"><span class="arrow-char">&lsaquo;</span><span class="arrow-name" style="transform:rotate(180deg)">'+prev.label+"</span></div>"}
if(ci<NAV.length-1){var next=NAV[ci+1];arrowsEl.innerHTML+='<div class="swipe-arrow swipe-arrow-right"><span class="arrow-char">&rsaquo;</span><span class="arrow-name">'+next.label+"</span></div>"}

var tsx=null,tsy=null;
document.addEventListener("touchstart",function(e){tsx=e.touches[0].clientX;tsy=e.touches[0].clientY},{passive:true});
document.addEventListener("touchend",function(e){if(tsx===null)return;var dx=e.changedTouches[0].clientX-tsx,dy=e.changedTouches[0].clientY-tsy;if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){if(dx<0&&ci<NAV.length-1)window.location.href=NAV[ci+1].href;else if(dx>0&&ci>0)window.location.href=NAV[ci-1].href}tsx=null},{passive:true});
})();
</script>
</body>
