<title>Black Rose · Tier 2 — Oakland After Dark (embedded scene)</title>
<style>
  :root{--silver:#C0C0C0;--faint:#7d7e81;--amber:#e0a86a;
    --display:"Hoefler Text",Garamond,Georgia,serif;--mono:"SF Mono",ui-monospace,Menlo,monospace;
    --grade:rgba(10,12,24,.34);--sx:0px;--sy:0px}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#000;overflow:hidden;font-family:var(--mono)}
  .stage{position:fixed;inset:0;overflow:hidden}
  /* wrapper sized to the slice-scaled image → everything inside is in image space, stays aligned */
  .wrap{position:absolute;transform:translate(var(--sx),var(--sy));
    transition:transform .5s cubic-bezier(.2,.6,.2,1);will-change:transform}
  .bg{position:absolute;inset:0;background:var(--img) center/cover}
  .lay{position:absolute;inset:0;width:100%;height:100%}   /* svg, image-pixel coords */

  .grade{position:absolute;inset:0;background:var(--grade);mix-blend-mode:soft-light;
    transition:background 6s ease-in-out;pointer-events:none}
  .stars{position:absolute;inset:0;pointer-events:none;opacity:var(--star,.5);transition:opacity 3s;mix-blend-mode:screen}
  .moon{position:absolute;top:6%;left:66%;width:320px;height:320px;pointer-events:none;opacity:var(--moon,.7);
    transition:opacity 3s;transform:translate(calc(var(--sx)*1.6),calc(var(--sy)*1.6));
    background:radial-gradient(circle,rgba(224,226,232,.20),rgba(200,202,210,.06) 40%,transparent 66%)}
  .fog{position:absolute;inset:-10%;pointer-events:none;mix-blend-mode:screen;
    transform:translateX(calc(var(--sx)*2));animation:fogdrift 82s linear infinite;
    background:radial-gradient(40vw 20vh at 24% 58%,rgba(150,154,164,.09),transparent 60%),
      radial-gradient(52vw 24vh at 72% 64%,rgba(130,134,146,.08),transparent 62%)}
  @keyframes fogdrift{from{transform:translateX(-6vw)}to{transform:translateX(6vw)}}
  .vig{position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(130% 100% at 50% 46%,transparent 55%,rgba(0,0,0,.55))}

  /* flowing bridge lights (SVG, image coords) */
  .stream{fill:none;stroke:var(--amber);stroke-width:2.4;stroke-linecap:round;
    stroke-dasharray:2 20;filter:drop-shadow(0 0 3px rgba(224,168,106,.9));opacity:.9;
    animation:flow 1.1s linear infinite}
  @keyframes flow{to{stroke-dashoffset:-22}}
  .deck{fill:none;stroke:rgba(224,168,106,.16);stroke-width:1}
  .beacon{fill:#ffd9a6;filter:drop-shadow(0 0 5px rgba(255,200,120,.95))}
  @media (prefers-reduced-motion:reduce){.stream{animation:none}.fog{animation:none}
    .grade,.moon,.stars{transition:none}.beacon,.pulse{animation:none!important}}

  /* in-scene product hotspots — light up the garment already staged, no floating card */
  .pin{position:absolute;transform:translate(-50%,-50%);cursor:pointer;pointer-events:auto;
    width:18px;height:18px}
  .pin .pulse{position:absolute;inset:0;border-radius:50%;border:1px solid var(--silver);
    box-shadow:0 0 0 5px rgba(192,192,192,.05);animation:pulse 3s ease-out infinite}
  .pin .core{position:absolute;inset:6px;border-radius:50%;background:var(--silver);opacity:.85}
  @keyframes pulse{0%{transform:scale(.7);opacity:.9}70%{opacity:0}100%{transform:scale(2.2);opacity:0}}
  /* the "spotlight" that reveals the garment sits behind, revealed on hover */
  .pin .spot{position:absolute;left:50%;top:50%;width:220px;height:220px;transform:translate(-50%,-50%) scale(.6);
    border-radius:50%;pointer-events:none;opacity:0;transition:opacity .5s,transform .5s;mix-blend-mode:screen;
    background:radial-gradient(circle,rgba(224,168,106,.16),transparent 62%)}
  .pin .lbl{position:absolute;left:50%;bottom:26px;transform:translateX(-50%) translateY(6px);
    white-space:nowrap;opacity:0;transition:opacity .45s,transform .45s;pointer-events:none;
    background:rgba(8,8,10,.72);border:1px solid rgba(192,192,192,.22);backdrop-filter:blur(6px);
    padding:.5rem .8rem;text-align:center}
  .pin:hover .spot,.pin:focus-visible .spot{opacity:1;transform:translate(-50%,-50%) scale(1)}
  .pin:hover .lbl,.pin:focus-visible .lbl{opacity:1;transform:translateX(-50%)}
  .pin .name{font-family:var(--display);color:var(--silver);font-size:.9rem;letter-spacing:.02em;display:block}
  .pin .meta{font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--amber)}

  .hud{position:fixed;inset:0;z-index:5;pointer-events:none;display:flex;flex-direction:column;
    justify-content:space-between;padding:clamp(1.4rem,4vw,3rem)}
  .top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem}
  .eyebrow{font-size:.68rem;letter-spacing:.26em;text-transform:uppercase;color:var(--faint)}
  .title{font-family:var(--display);color:var(--silver);text-transform:uppercase;letter-spacing:.14em;
    font-size:clamp(1.3rem,3vw,2rem);margin:.3rem 0 0;font-weight:500;text-shadow:0 2px 30px rgba(0,0,0,.6)}
  .state{font-size:.72rem;letter-spacing:.2em;color:var(--silver);text-align:right;text-transform:uppercase}
  .state small{display:block;color:#b8b9bc;letter-spacing:.14em;margin-top:.3rem;font-size:.62rem}
  .bottom{font-size:.66rem;letter-spacing:.14em;color:#c9cacd;display:flex;justify-content:space-between;
    gap:1rem;flex-wrap:wrap;text-shadow:0 1px 12px rgba(0,0,0,.8)}
  .bottom b{color:var(--silver)}@media (prefers-reduced-motion:reduce){.hint{display:none}}
</style>

  // size the wrap to a slice-scaled 1365x768 (matches background cover), centered — keeps overlay aligned
  var IW=1365,IH=768,HEAD=1.05;
  function fit(){var vw=innerWidth,vh=innerHeight,s=Math.max(vw/IW,vh/IH)*HEAD,w=IW*s,h=IH*s;
    wrap.style.width=w+'px';wrap.style.height=h+'px';
    wrap.style.left=(vw-w)/2+'px';wrap.style.top=(vh-h)/2+'px';}
  fit();addEventListener('resize',fit);

  var STATES=[
    {name:'Deep Night',hint:'moon rising · stars sharp',grade:'rgba(10,12,24,.34)',moon:.5,star:1.0},
    {name:'Bay Fog',hint:'mist off the water',grade:'rgba(26,28,36,.30)',moon:.35,star:.35},
    {name:'Moonhigh',hint:'silver rim · the armor light',grade:'rgba(18,26,46,.24)',moon:.85,star:.7},
    {name:'Oxblood Hour',hint:'the one warmth before dawn',grade:'rgba(46,14,18,.30)',moon:.5,star:.5}
  ];
  var sn=document.getElementById('sn'),sh=document.getElementById('sh'),i=0;
  function apply(s){R.setProperty('--grade',s.grade);R.setProperty('--moon',s.moon);
    R.setProperty('--star',s.star);sn.textContent=s.name;sh.textContent=s.hint;}
  if(reduce)apply(STATES[2]);else{apply(STATES[0]);setInterval(function(){i=(i+1)%STATES.length;apply(STATES[i]);},7000);}

  if(!reduce){var tx=0,ty=0,cx=0,cy=0;
    addEventListener('pointermove',function(e){tx=(e.clientX/innerWidth-.5)*-16;ty=(e.clientY/innerHeight-.5)*-11;});
    (function loop(){cx+=(tx-cx)*.06;cy+=(ty-cy)*.06;
      R.setProperty('--sx',cx.toFixed(2)+'px');R.setProperty('--sy',cy.toFixed(2)+'px');
      requestAnimationFrame(loop);})();}

  var c=document.querySelector('.stars'),x=c.getContext('2d'),st=[],W,H;
  function sz(){W=c.width=innerWidth;H=c.height=innerHeight;st=[];var n=Math.round(W*H/16000);
    for(var k=0;k<n;k++)st.push({x:Math.random()*W,y:Math.random()*H*.4,r:Math.random()*1.0+.2,p:Math.random()*6.28,s:Math.random()*.6+.2});}
  sz();addEventListener('resize',sz);
  function draw(t){x.clearRect(0,0,W,H);for(var k=0;k<st.length;k++){var s=st[k];
    x.globalAlpha=reduce?.7:(.5+.5*Math.sin(t*.001*s.s+s.p));x.beginPath();x.arc(s.x,s.y,s.r,0,6.283);
    x.fillStyle='#eef0f6';x.fill();}if(!reduce)requestAnimationFrame(draw);}
  if(reduce)draw(0);else requestAnimationFrame(draw);
