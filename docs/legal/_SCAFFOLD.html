<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}} — SkyyRose</title>
<style>
  :root{--ink:#0A0A0A;--paper:#faf8f5;--rose:#B76E79;--muted:#6b6b6b;--line:#e7e2db}
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font:16px/1.7 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Helvetica,Arial,sans-serif}
  .wrap{max-width:820px;margin:0 auto;padding:48px 24px 96px}
  .disclaimer{border:1px solid var(--rose);background:#fff;border-radius:10px;padding:14px 18px;font-size:13px;color:var(--muted);margin-bottom:40px}
  .disclaimer strong{color:var(--ink)}
  h1{font:600 34px/1.2 "Playfair Display",Georgia,serif;margin:0 0 6px}
  .meta{color:var(--muted);font-size:14px;margin:2px 0}
  .intro{margin:24px 0 8px}
  h2{font:600 22px/1.3 "Playfair Display",Georgia,serif;margin:44px 0 12px;padding-top:18px;border-top:1px solid var(--line)}
  h3{font-size:17px;margin:24px 0 8px}
  a{color:var(--rose)}
  ul,ol{padding-left:22px}
  li{margin:5px 0}
  .toc{background:#fff;border:1px solid var(--line);border-radius:10px;padding:18px 22px;margin:28px 0 8px}
  .toc ol{margin:8px 0 0}
  table{width:100%;border-collapse:collapse;margin:16px 0;font-size:14px}
  th,td{border:1px solid var(--line);padding:8px 10px;text-align:left;vertical-align:top}
  th{background:#fff}
  .placeholder{background:#fff3cd;padding:1px 6px;border-radius:4px;font-weight:600}
  footer{margin-top:56px;padding-top:20px;border-top:1px solid var(--line);color:var(--muted);font-size:14px}
  code{background:#fff;border:1px solid var(--line);padding:1px 5px;border-radius:4px;font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <div class="disclaimer"><strong>Template — not legal advice.</strong> This document was drafted as a starting point for SkyyRose LLC and must be reviewed and approved by a licensed attorney before publication. Bracketed <span class="placeholder">[PLACEHOLDER]</span> values must be completed first.</div>
  <h1>{{TITLE}}</h1>
  <p class="meta"><strong>SkyyRose LLC</strong> · skyyrose.co</p>
  <p class="meta">Last updated: June 5, 2026</p>

  <!-- {{INTRO}} : one or two sentence intro paragraph in <p class="intro"> -->
  <!-- {{TOC}} : <div class="toc"><strong>Contents</strong><ol>…anchored list…</ol></div> -->
  <!-- {{SECTIONS}} : the document body — <section id="…"><h2>…</h2>…</section> blocks -->

  <footer>
    <!-- {{CONTACT}} : contact block with the correct email(s) + mailing-address placeholder -->
  </footer>
</div>
</body>
</html>
