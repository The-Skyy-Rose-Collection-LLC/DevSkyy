<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Skyy Compare</title>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"}}</script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0a; display:flex; }
.pane { flex:1; position:relative; }
canvas { display:block; width:100%; height:100vh; }
.label { position:absolute; top:12px; left:50%; transform:translateX(-50%); color:#B76E79; font:bold 13px sans-serif; letter-spacing:1px; }
.loading { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#B76E79; font:14px sans-serif; }
</style>
</head>
<body>
<div class="pane" id="pane-remesh"><div class="label">REMESH</div><div class="loading" id="l1">Loading...</div></div>
<div class="pane" id="pane-newgen"><div class="label">NEW GEN</div><div class="loading" id="l2">Loading...</div></div>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

function fitCameraToSelection(camera, controls, selection) {
  const box = new THREE.Box3().setFromObject(selection);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const maxSize = Math.max(size.x, size.y, size.z);
  const distance = 1.4 * maxSize / (2 * Math.atan(Math.PI * camera.fov / 360));
  const direction = controls.target.clone().sub(camera.position).normalize().multiplyScalar(distance);
  controls.maxDistance = distance * 10;
  controls.minDistance = distance / 10;
  controls.target.copy(center);
  camera.near = distance / 100;
  camera.far = distance * 100;
  camera.updateProjectionMatrix();
  camera.position.copy(controls.target).sub(direction);
  controls.update();
}

function makePane(containerId, modelFile, loadingId) {
  const container = document.getElementById(containerId);
  const canvas = document.createElement('canvas');
  container.appendChild(canvas);
  const w = container.clientWidth, h = window.innerHeight;
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(w, h);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  const pmrem = new THREE.PMREMGenerator(renderer);
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x111111);
  scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
  const camera = new THREE.PerspectiveCamera(45, w / h, 0.001, 1000);
  const controls = new OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  scene.add(new THREE.DirectionalLight(0xffffff, 1.5).position.set(2, 4, 3) && new THREE.DirectionalLight(0xffffff, 1.5));
  const ground = new THREE.Mesh(new THREE.PlaneGeometry(20,20), new THREE.MeshStandardMaterial({color:0x111111,roughness:1}));
  ground.rotation.x = -Math.PI/2;
  scene.add(ground);
  new GLTFLoader().load(modelFile, gltf => {
    document.getElementById(loadingId).remove();
    const model = gltf.scene;
    const box = new THREE.Box3().setFromObject(model);
    model.position.y -= box.min.y;
    scene.add(model);
    fitCameraToSelection(camera, controls, model);
    const mb = new THREE.Box3().setFromObject(model);
    controls.target.set(mb.getCenter(new THREE.Vector3()).x, mb.getCenter(new THREE.Vector3()).y * 0.75, mb.getCenter(new THREE.Vector3()).z);
    controls.update();
  }, undefined, err => { document.getElementById(loadingId).textContent = 'Error: ' + err.message; });
  return { renderer, scene, camera, controls };
}

const panes = [
  makePane('pane-remesh', './skyy-remesh.glb', 'l1'),
  makePane('pane-newgen', './skyy-new-gen.glb', 'l2'),
];
function animate() {
  requestAnimationFrame(animate);
  panes.forEach(p => { p.controls.update(); p.renderer.render(p.scene, p.camera); });
}
animate();
</script>
</body>
</html>
