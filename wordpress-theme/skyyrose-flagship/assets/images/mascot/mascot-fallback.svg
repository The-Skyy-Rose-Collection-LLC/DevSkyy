<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <defs>
    <linearGradient id="body-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9868f"/>
      <stop offset="100%" stop-color="#B76E79"/>
    </linearGradient>
    <radialGradient id="rose-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B76E79" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#B76E79" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dress-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="60%" stop-color="#2a1a1f"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <style>
      @keyframes idle-breathe {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-3px); }
      }
      @keyframes rose-pulse {
        0%, 100% { opacity: 0.7; }
        50% { opacity: 1; }
      }
      @keyframes glow-pulse {
        0%, 100% { r: 40; opacity: 0.15; }
        50% { r: 50; opacity: 0.25; }
      }
      .mascot-body { animation: idle-breathe 3s ease-in-out infinite; }
      .rose-bloom { animation: rose-pulse 2.5s ease-in-out infinite; }
      .ambient-glow { animation: glow-pulse 3s ease-in-out infinite; }
      @media (prefers-reduced-motion: reduce) {
        .mascot-body, .rose-bloom, .ambient-glow { animation: none; }
      }
    </style>
  </defs>

  <!-- Ambient glow behind figure -->
  <circle class="ambient-glow" cx="100" cy="160" r="45" fill="url(#rose-glow)"/>

  <g class="mascot-body">
    <!-- Dress / body silhouette -->
    <path d="M100 105 C72 105 55 140 50 190 C48 210 52 245 60 265 L140 265 C148 245 152 210 150 190 C145 140 128 105 100 105Z" fill="url(#dress-grad)" stroke="#B76E79" stroke-width="1" stroke-opacity="0.3"/>

    <!-- Neckline accent -->
    <path d="M85 108 Q100 118 115 108" fill="none" stroke="#B76E79" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

    <!-- Head silhouette -->
    <ellipse cx="100" cy="78" rx="28" ry="32" fill="#1a1a1a"/>

    <!-- Hair swept detail -->
    <path d="M72 68 Q80 45 100 42 Q120 45 128 68" fill="none" stroke="#2a1a1f" stroke-width="6" stroke-linecap="round"/>

    <!-- Face features (minimal, elegant) -->
    <ellipse cx="90" cy="76" rx="2.5" ry="1.5" fill="#B76E79" opacity="0.8"/>
    <ellipse cx="110" cy="76" rx="2.5" ry="1.5" fill="#B76E79" opacity="0.8"/>
    <path d="M95 88 Q100 92 105 88" fill="none" stroke="#B76E79" stroke-width="1" stroke-linecap="round" opacity="0.5"/>

    <!-- Rose motif on chest -->
    <g class="rose-bloom" transform="translate(100,135)">
      <!-- Outer petals -->
      <ellipse cx="0" cy="-6" rx="5" ry="8" fill="#B76E79" opacity="0.8" transform="rotate(0)"/>
      <ellipse cx="0" cy="-6" rx="5" ry="8" fill="#B76E79" opacity="0.7" transform="rotate(72)"/>
      <ellipse cx="0" cy="-6" rx="5" ry="8" fill="#B76E79" opacity="0.75" transform="rotate(144)"/>
      <ellipse cx="0" cy="-6" rx="5" ry="8" fill="#B76E79" opacity="0.7" transform="rotate(216)"/>
      <ellipse cx="0" cy="-6" rx="5" ry="8" fill="#B76E79" opacity="0.8" transform="rotate(288)"/>
      <!-- Inner center -->
      <circle cx="0" cy="0" r="3" fill="#c9868f"/>
    </g>

    <!-- Dress hem detail -->
    <path d="M60 265 Q80 258 100 262 Q120 258 140 265" fill="none" stroke="#B76E79" stroke-width="1" stroke-linecap="round" opacity="0.4"/>

    <!-- Waist sash accent -->
    <path d="M78 160 Q100 155 122 160" fill="none" stroke="#B76E79" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

    <!-- Arms silhouette -->
    <path d="M72 120 Q58 145 62 170" fill="none" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round"/>
    <path d="M128 120 Q142 145 138 170" fill="none" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round"/>

    <!-- Hands -->
    <circle cx="62" cy="172" r="5" fill="#1a1a1a"/>
    <circle cx="138" cy="172" r="5" fill="#1a1a1a"/>

    <!-- Feet / shoes -->
    <ellipse cx="82" cy="272" rx="10" ry="5" fill="#1a1a1a"/>
    <ellipse cx="118" cy="272" rx="10" ry="5" fill="#1a1a1a"/>

    <!-- SR monogram on hem -->
    <text x="100" y="250" text-anchor="middle" font-family="serif" font-size="10" fill="#B76E79" opacity="0.4" font-style="italic">SR</text>
  </g>
</svg>
